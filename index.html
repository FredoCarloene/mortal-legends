<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const W=800,H=400,GY=320,GR=0.8,CW=60,CH=90,RT=99;
const CHARS={gandhi:{name:"GANDHI",accent:"#e8a926",pd:2,kd:4,sd:12,sp:3.8,br:0.85},binladen:{name:"BIN LADEN",accent:"#c0392b",pd:2,kd:4,sd:12,sp:3.8,br:0.85}};
const PF="'Press Start 2P',monospace";

// SFX
const AC=window.AudioContext||window.webkitAudioContext;
class Sfx{
  constructor(){this.c=null;this.g=null;this.m=false}
  init(){if(this.c)return;try{this.c=new AC();this.g=this.c.createGain();this.g.gain.value=0.35;this.g.connect(this.c.destination)}catch(e){}}
  o(t,f,d,v=0.3){if(!this.c||this.m)return;const o=this.c.createOscillator(),g=this.c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.c.currentTime+d);o.connect(g);g.connect(this.g);o.start();o.stop(this.c.currentTime+d)}
  n(d,v=0.15){if(!this.c||this.m)return;const l=this.c.sampleRate*d,b=this.c.createBuffer(1,l,this.c.sampleRate),a=b.getChannelData(0);for(let i=0;i<l;i++)a[i]=Math.random()*2-1;const s=this.c.createBufferSource();s.buffer=b;const g=this.c.createGain();g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.c.currentTime+d);const f=this.c.createBiquadFilter();f.type="highpass";f.frequency.value=800;s.connect(f);f.connect(g);g.connect(this.g);s.start();s.stop(this.c.currentTime+d)}
  punch(){this.n(.08,.25);this.o("square",200,.06,.2)}
  kick(){this.o("sine",100,.15,.35);this.n(.1,.2)}
  special(){for(let i=0;i<5;i++)setTimeout(()=>this.o("sawtooth",300+i*120,.2,.2),i*40);this.n(.3,.15)}
  block(){this.o("triangle",300,.1,.15)}
  hit(){this.n(.06,.3);this.o("square",150,.08,.2)}
  ko(){[600,500,400,300,200].forEach((f,i)=>setTimeout(()=>this.o("square",f,.3,.2),i*100))}
  roundStart(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.o("square",f,.15,.15),i*100))}
  fight(){this.o("sawtooth",400,.1,.2);setTimeout(()=>this.o("square",1000,.3,.2),80)}
  win(){[523,659,784,880,1047,1175,1319,1568].forEach((f,i)=>setTimeout(()=>this.o("square",f,.2,.12),i*120))}
  superReady(){[800,1000,1200,1600].forEach((f,i)=>setTimeout(()=>this.o("sawtooth",f,.12,.18),i*60))}
  boomerang(){for(let i=0;i<8;i++)setTimeout(()=>this.o("triangle",500+i*60,.1,.15),i*30);this.n(.2,.1)}
  gunshot(){this.n(.12,.4);this.o("square",60,.15,.3);this.o("sawtooth",150,.08,.2)}
  bgDrone(){if(this.c&&!this.m)this.o("sine",55,2,.04)}
  connect(){this.o("sine",880,.15,.2);setTimeout(()=>this.o("sine",1320,.15,.2),100)}
}
const sfx=new Sfx();

// Projectiles (mutates game state g)
function updProj(g){
  g.projectiles=g.projectiles.filter(p=>{
    p.age++;const tg=p.owner==="p1"?g.p2:g.p1,tx=tg.x+CW/2,ty=tg.y+CH/2;
    if(p.type==="boomerang"){
      if(p.phase==="out"){const dx=tx-p.x;p.x+=dx>0?Math.min(8,dx):Math.max(-8,dx);p.y+=(ty-p.y)*.05;p.rotation+=.5;if(Math.abs(dx)<15||p.age>80)p.phase="back"}
      else{const ow=p.owner==="p1"?g.p1:g.p2,ox=ow.x+CW/2,dx=ox-p.x;p.x+=dx>0?Math.min(9,dx):Math.max(-9,dx);p.y+=((ow.y+35)-p.y)*.08;p.rotation+=.5;if(Math.abs(dx)<20)return false}
      if(Math.abs(p.x-tx)<35&&Math.abs(p.y-ty)<50&&!p.hit){p.hit=true;const dm=tg.isBlocking?2:10;tg.health=Math.max(0,tg.health-dm);tg.hitStun=12;g.shake=6;g.fx.push({x:tx,y:tg.y+30,f:0,t:"special"});g.snd.push(tg.isBlocking?"block":"hit");(p.owner==="p1"?g.p1:g.p2).dd+=dm}
      return p.age<150;
    }else if(p.type==="bullet"){
      p.x+=p.dir*14;
      if(Math.abs(p.x-tx)<30&&Math.abs(p.y-ty)<45&&!p.hit){p.hit=true;const dm=tg.isBlocking?1:4;tg.health=Math.max(0,tg.health-dm);tg.hitStun=6;g.shake=4;g.fx.push({x:tx,y:tg.y+30,f:0,t:"normal"});g.snd.push(tg.isBlocking?"block":"hit");(p.owner==="p1"?g.p1:g.p2).dd+=dm;return false}
      return p.x>-20&&p.x<W+20;
    }
    return false;
  });
}

// Drawing functions
function drawProj(c,proj,fr){for(const p of proj){if(p.type==="boomerang"){c.save();c.translate(p.x,p.y);c.rotate(p.rotation);c.shadowColor="#e8a926";c.shadowBlur=12;c.fillStyle="#e8a926";c.fillRect(-20,-3,40,6);c.fillStyle="#fff";c.fillRect(-18,-1,8,2);c.fillRect(10,-1,8,2);c.shadowBlur=0;c.fillStyle=`rgba(232,169,38,${.3+Math.sin(fr*.3)*.15})`;c.beginPath();c.arc(0,0,18,0,Math.PI*2);c.fill();c.restore()}else if(p.type==="bullet"){c.save();c.translate(p.x,p.y);c.fillStyle="#ffdd44";c.shadowColor="#ff8800";c.shadowBlur=6;c.fillRect(p.dir>0?-2:-10,-2,12,4);c.fillStyle=`rgba(255,150,50,${Math.max(0,.5-p.age*.03)})`;c.fillRect(p.dir>0?-14:2,-1,10,2);c.shadowBlur=0;c.restore()}}}

function drawChar(c,pl,fac,fr,act,blk,sr,sa,sb,sm){
  const{x,y}=pl,isG=pl.id==="gandhi";c.save();c.translate(x+CW/2,y);if(fac===-1)c.scale(-1,1);
  c.fillStyle="rgba(0,0,0,0.3)";c.beginPath();c.ellipse(0,CH+2,30,8,0,0,Math.PI*2);c.fill();
  const b=Math.sin(fr*.15)*2;
  if(sr&&!sa){const p=Math.sin(fr*.15)*.3+.5;c.fillStyle=isG?`rgba(232,169,38,${p*.25})`:`rgba(192,57,43,${p*.25})`;c.beginPath();c.arc(0,45,45+Math.sin(fr*.2)*5,0,Math.PI*2);c.fill();for(let i=0;i<4;i++){const a=fr*.05+i*Math.PI/2,r=35+Math.sin(fr*.1+i)*10;c.fillStyle=isG?"#e8a926":"#ff4444";c.fillRect(Math.cos(a)*r-1,45+Math.sin(a)*r-1,3,3)}}
  if(sa){const p=Math.sin(fr*.25)*.2+.4;c.fillStyle=isG?`rgba(232,169,38,${p})`:`rgba(192,57,43,${p})`;c.beginPath();c.arc(0,45,35,0,Math.PI*2);c.fill()}
  if(isG)dG(c,b,act,blk,fr,sa,sr,sm);else dB(c,b,act,blk,fr,sa,sb,sr);c.restore();
}

function dG(c,b,a,bl,fr,sa,sr,sm){
  c.fillStyle="#f5f0e0";c.fillRect(-15,25+b,30,45);c.fillStyle="#e8dcc0";c.fillRect(-18,40+b,6,30);
  if(a==="kick"){c.fillStyle="#8B7355";c.fillRect(-12,70+b,8,18);c.fillStyle="#654321";c.fillRect(-14,86+b,12,4);c.fillStyle="#8B7355";c.fillRect(12,65+b,28,8);c.fillStyle="#654321";c.fillRect(36,64+b,8,4)}
  else{c.fillStyle="#8B7355";c.fillRect(-12,70+b,8,18);c.fillRect(4,70+b,8,18);c.fillStyle="#654321";c.fillRect(-14,86+b,12,4);c.fillRect(2,86+b,12,4)}
  c.fillStyle="#C4956A";c.beginPath();c.arc(0,18+b,16,0,Math.PI*2);c.fill();
  c.strokeStyle="#333";c.lineWidth=1.5;c.beginPath();c.arc(-6,16+b,5,0,Math.PI*2);c.stroke();c.beginPath();c.arc(6,16+b,5,0,Math.PI*2);c.stroke();
  c.fillStyle="#222";c.fillRect(-7,15+b,3,3);c.fillRect(5,15+b,3,3);
  c.strokeStyle="#8B6914";c.lineWidth=1;c.beginPath();c.arc(0,20+b,5,.1,Math.PI-.1);c.stroke();
  c.fillStyle="#C4956A";c.beginPath();c.ellipse(-15,18+b,4,6,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(15,18+b,4,6,0,0,Math.PI*2);c.fill();
  if(sr||sa){const n=sa?(sm||0):2;for(let i=0;i<n;i++){c.save();c.translate(-8+i*16,-8+b+Math.sin(fr*.2+i)*2);c.rotate(fr*.1);c.fillStyle="#e8a926";c.shadowColor="#e8a926";c.shadowBlur=4;c.fillRect(-6,-1.5,12,3);c.shadowBlur=0;c.restore()}}
  if(a==="super"){c.fillStyle="#C4956A";c.fillRect(15,25+b,25,8);c.fillRect(-20,35+b,12,8)}
  else if(a==="punch"){c.fillStyle="#C4956A";c.fillRect(15,30+b,30,8);c.fillStyle="#8B6914";c.fillRect(40,25+b,4,25)}
  else if(a==="kick"){c.fillStyle="#C4956A";c.fillRect(15,30+b,15,8);c.fillRect(-15,30+b,15,8)}
  else if(a==="special"){c.save();c.translate(0,40+b);c.rotate(fr*.5);c.fillStyle="#e8a926";c.shadowColor="#e8a926";c.shadowBlur=15;c.fillRect(-30,-2,60,4);c.restore();c.fillStyle="#C4956A";c.fillRect(15,30+b,12,8);c.fillRect(-27,30+b,12,8)}
  else if(bl){c.fillStyle="#C4956A";c.fillRect(-5,28+b,25,8);c.fillRect(-20,32+b,25,8);c.strokeStyle="rgba(232,169,38,0.6)";c.lineWidth=2;c.beginPath();c.arc(0,45+b,25,0,Math.PI*2);c.stroke()}
  else{c.fillStyle="#C4956A";c.fillRect(15,30+b,12,8);c.fillRect(-27,30+b,12,8);if(!sa){c.fillStyle="#8B6914";c.fillRect(22,25+b,3,50)}}
}

function dB(c,b,a,bl,fr,sa,sb,sr){
  c.fillStyle="#4a4a4a";c.fillRect(-18,22+b,36,50);c.fillStyle="#3a3a3a";c.fillRect(-18,22+b,36,5);c.fillRect(-2,22+b,4,50);
  if(a==="kick"){c.fillStyle="#333";c.fillRect(-12,70+b,8,18);c.fillStyle="#222";c.fillRect(-14,84+b,12,6);c.fillStyle="#333";c.fillRect(12,65+b,30,10);c.fillStyle="#222";c.fillRect(38,63+b,10,12)}
  else{c.fillStyle="#333";c.fillRect(-12,70+b,8,18);c.fillRect(4,70+b,8,18);c.fillStyle="#222";c.fillRect(-14,84+b,12,6);c.fillRect(2,84+b,12,6)}
  c.fillStyle="#f0f0f0";c.beginPath();c.arc(0,12+b,17,-Math.PI,0);c.fill();c.fillRect(-17,5+b,34,10);
  c.fillStyle="#C4956A";c.beginPath();c.arc(0,18+b,14,0,Math.PI);c.fill();c.fillRect(-14,12+b,28,10);
  c.fillStyle="#444";c.beginPath();c.moveTo(-10,22+b);c.lineTo(10,22+b);c.lineTo(6,35+b);c.lineTo(0,38+b);c.lineTo(-6,35+b);c.closePath();c.fill();
  c.fillStyle="#fff";c.fillRect(-8,14+b,6,4);c.fillRect(2,14+b,6,4);c.fillStyle="#111";c.fillRect(-6,15+b,3,3);c.fillRect(3,15+b,3,3);
  c.fillStyle="#333";c.save();c.translate(-5,12+b);c.rotate(-.2);c.fillRect(-4,0,8,2);c.restore();c.save();c.translate(5,12+b);c.rotate(.2);c.fillRect(-4,0,8,2);c.restore();
  c.fillStyle="#2a2a1a";c.fillRect(-22,28+b,8,20);
  if(sr||sa){const lv=sa?(sb||0):5;for(let i=0;i<5;i++){const ix=-16+i*8,iy=-8+b+Math.sin(fr*.15+i*.5)*1.5;c.fillStyle=i<lv?"#e8a926":"#333";c.shadowColor=i<lv?"#e8a926":"transparent";c.shadowBlur=i<lv?3:0;c.beginPath();c.arc(ix,iy,2.5,0,Math.PI*2);c.fill();c.fillRect(ix-1,iy+2,2,4);c.shadowBlur=0}}
  if(sa){c.fillStyle="#4a4a4a";c.fillRect(10,32+b,15,8);c.fillStyle="#555";c.fillRect(20,30+b,35,6);c.fillStyle="#666";c.fillRect(50,29+b,8,3);if(a==="super"&&fr%4<2){c.fillStyle="#ffaa00";c.beginPath();c.arc(60,31+b,6,0,Math.PI*2);c.fill()}}
  else if(a==="punch"){c.fillStyle="#4a4a4a";c.fillRect(15,30+b,30,10);c.fillStyle="#C4956A";c.fillRect(42,28+b,10,12)}
  else if(a==="kick"){c.fillStyle="#4a4a4a";c.fillRect(15,30+b,15,8);c.fillRect(-15,30+b,15,8)}
  else if(a==="special"){c.fillStyle="#4a4a4a";c.fillRect(15,25+b,20,8);c.fillRect(-35,25+b,20,8);const ps=20+Math.sin(fr*.4)*8;c.fillStyle="rgba(192,57,43,0.5)";c.beginPath();c.arc(0,45+b,ps,0,Math.PI*2);c.fill()}
  else if(bl){c.fillStyle="#4a4a4a";c.fillRect(-5,25+b,25,10);c.fillRect(-20,30+b,25,10);c.strokeStyle="rgba(192,57,43,0.5)";c.lineWidth=2;c.beginPath();c.arc(0,45+b,25,0,Math.PI*2);c.stroke()}
  else{c.fillStyle="#4a4a4a";c.fillRect(15,30+b,15,8);c.fillRect(-30,30+b,15,8);c.fillStyle="#C4956A";c.fillRect(28,28+b,8,10);c.fillRect(-30,28+b,8,10)}
}

function drawStage(c,fr){
  const sg=c.createLinearGradient(0,0,0,GY);sg.addColorStop(0,"#0a0a2e");sg.addColorStop(.5,"#1a0a3e");sg.addColorStop(1,"#2d1b69");c.fillStyle=sg;c.fillRect(0,0,W,GY);
  c.fillStyle="#1a1040";c.beginPath();c.moveTo(0,GY);for(let x=0;x<=W;x+=40)c.lineTo(x,GY-60-Math.sin(x*.02)*30-Math.cos(x*.01)*20);c.lineTo(W,GY);c.fill();
  c.fillStyle="#ffe4b5";c.shadowColor="#ffe4b5";c.shadowBlur=30;c.beginPath();c.arc(650,60,25,0,Math.PI*2);c.fill();c.shadowBlur=0;
  for(let i=0;i<30;i++){const sx=(i*137.5)%W,sy=(i*73.1)%(GY-80);c.fillStyle=`rgba(255,255,255,${.3+(Math.sin(fr*.1+i)*.5+.5)*.7})`;c.fillRect(sx,sy,2,2)}
  for(const tx of[80,720]){c.fillStyle="#5a3a1a";c.fillRect(tx-3,GY-80,6,80);const fl=Math.sin(fr*.3+tx)*3;c.fillStyle="#ff6600";c.beginPath();c.ellipse(tx,GY-85,8+fl,15+fl,0,0,Math.PI*2);c.fill();c.fillStyle="#ffaa00";c.beginPath();c.ellipse(tx,GY-88,4+fl*.5,8+fl*.5,0,0,Math.PI*2);c.fill()}
  const gg=c.createLinearGradient(0,GY,0,H);gg.addColorStop(0,"#4a3520");gg.addColorStop(1,"#1a1005");c.fillStyle=gg;c.fillRect(0,GY,W,H-GY);
  c.strokeStyle="#6a4530";c.lineWidth=2;c.beginPath();c.moveTo(0,GY);c.lineTo(W,GY);c.stroke();
}

function drawHB(c,x,y,hp,mx,sp,nm,ac,isR,sr,sa,sl,sc){
  const bW=280,bH=20,r=Math.max(0,hp/mx),sR=Math.min(1,sp/100);
  c.fillStyle="rgba(0,0,0,0.5)";c.fillRect(isR?x+bW-120:x,y-20,120,16);
  c.fillStyle="#fff";c.font=`bold 11px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(nm,isR?x+bW:x,y-8);
  c.fillStyle="#222";c.fillRect(x,y,bW,bH);
  const hg=c.createLinearGradient(x,y,x+bW,y);
  if(r>.5){hg.addColorStop(0,"#00cc44");hg.addColorStop(1,"#00ff55")}else if(r>.25){hg.addColorStop(0,"#ccaa00");hg.addColorStop(1,"#ffcc00")}else{hg.addColorStop(0,"#cc2200");hg.addColorStop(1,"#ff3300")}
  c.fillStyle=hg;if(isR)c.fillRect(x+bW*(1-r),y,bW*r,bH);else c.fillRect(x,y,bW*r,bH);
  c.strokeStyle=ac;c.lineWidth=2;c.strokeRect(x,y,bW,bH);
  c.fillStyle="#fff";c.font=`10px ${PF}`;c.textAlign="center";c.fillText(`${Math.ceil(hp)}`,x+bW/2,y+14);
  const sY=y+bH+4;c.fillStyle="#111";c.fillRect(x,sY,bW,7);c.fillStyle=ac;
  if(isR)c.fillRect(x+bW*(1-sR),sY,bW*sR,7);else c.fillRect(x,sY,bW*sR,7);
  c.strokeStyle="#555";c.lineWidth=1;c.strokeRect(x,sY,bW,7);
  if(sR>=1){c.fillStyle=ac;c.font=`7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText("SPECIAL READY!",isR?x+bW:x,sY+17)}
  if(sa){c.fillStyle="#ff4444";c.font=`bold 7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(`${sl} [${sc}]`,isR?x+bW:x,sY+28)}
  else if(sr){c.fillStyle=ac;c.font=`bold 7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(`★ ${sl}`,isR?x+bW:x,sY+28)}
}

function drawFx(c,x,y,f,t){if(f>15)return;const a=1-f/15,s=10+f*3;if(t==="special"){c.fillStyle=`rgba(255,200,50,${a})`;c.beginPath();c.arc(x,y,s*2,0,Math.PI*2);c.fill()}else{c.fillStyle=`rgba(255,255,255,${a})`;c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.fill()}}

// ─── MAIN COMPONENT ───
function Game(){
  const cvR=useRef(null);
  const[screen,setScreen]=useState("lobby"); // lobby|waiting|fight|dc
  const[roomCode,setRoomCode]=useState("");
  const[joinCode,setJoinCode]=useState("");
  const[role,setRole]=useState(null); // "p1"|"p2"
  const[status,setStatus]=useState("");
  const[isMobile,setIsMobile]=useState(false);
  const[copied,setCopied]=useState(false);
  const[tick,setTick]=useState(0); // force re-render

  // Refs for game state (no React re-renders during gameplay)
  const connR=useRef(null);
  const peerR=useRef(null);
  const isHost=useRef(false);
  const frameR=useRef(0);

  // Mobile button state - directly readable by game loop
  const btnDown=useRef({}); // currently held buttons
  const btnTap=useRef({}); // one-shot taps

  // Game state ref
  const mkP=(id,x,f)=>({id,x,y:GY-CH,vy:0,health:100,maxHealth:100,special:0,action:null,actionTimer:0,facing:f,isJumping:false,isBlocking:false,combo:0,comboTimer:0,hitStun:0,dd:0,superReady:false,superActive:false,superBullets:0,superBoomerangs:0,superUsed:false});
  const newGame=()=>({p1:mkP("gandhi",150,1),p2:mkP("binladen",550,-1),fx:[],shake:0,projectiles:[],snd:[],state:"fighting",ann:"ROUND 1",annTimer:120,round:1,wins:{p1:0,p2:0},timer:RT,timerAcc:0,roundEnded:false});
  const G=useRef(newGame());

  // Remote player input (received via WebRTC)
  const remoteIn=useRef({held:{},tap:{}});

  useEffect(()=>{setIsMobile(window.innerWidth<900||"ontouchstart"in window)},[]);
  useEffect(()=>{const p=new URLSearchParams(window.location.search);const c=p.get("room");if(c&&c.length===4)setJoinCode(c)},[]);

  // ─── NETWORK ───
  const onData=useCallback((d)=>{
    if(isHost.current&&d.t==="i"){
      // Host receives P2 inputs
      remoteIn.current={held:d.h||{},tap:d.tp||{}};
    }else if(!isHost.current&&d.t==="s"){
      // Client receives full game state from host
      const g=G.current;
      const ap=(t,s)=>{t.x=s.x;t.y=s.y;t.vy=s.v;t.health=s.h;t.special=s.sp;t.action=s.a;t.actionTimer=s.at;t.facing=s.f;t.isJumping=s.j;t.isBlocking=s.b;t.hitStun=s.hs;t.superReady=s.sr;t.superActive=s.sa;t.superBullets=s.sb;t.superBoomerangs=s.sm;t.superUsed=s.su;t.dd=s.dd;t.combo=s.c;t.comboTimer=s.ct};
      ap(g.p1,d.p1);ap(g.p2,d.p2);
      g.projectiles=(d.pr||[]).map(p=>({type:p.t,x:p.x,y:p.y,dir:p.d,phase:p.ph,rotation:p.r||0,age:p.a,hit:p.h,owner:p.o}));
      g.fx=(d.fx||[]).map(e=>({x:e.x,y:e.y,f:e.f,t:e.t}));
      g.shake=d.sk||0;g.state=d.gs;g.ann=d.an||"";g.annTimer=d.at||0;
      g.round=d.rd;g.wins=d.w;g.timer=d.tm;g.canRematch=d.cm||false;
      // Play sounds
      if(d.sn)d.sn.forEach(s=>{if(sfx[s])sfx[s]()});
    }
  },[]);

  const serialize=useCallback(()=>{
    const g=G.current;
    const sp=p=>({x:p.x|0,y:p.y|0,v:p.vy|0,h:Math.round(p.health),sp:Math.round(p.special),a:p.action,at:p.actionTimer,f:p.facing,j:p.isJumping,b:p.isBlocking,hs:p.hitStun,sr:p.superReady,sa:p.superActive,sb:p.superBullets,sm:p.superBoomerangs,su:p.superUsed,dd:p.dd|0,c:p.combo,ct:p.comboTimer});
    return{t:"s",p1:sp(g.p1),p2:sp(g.p2),
      pr:g.projectiles.map(p=>({t:p.type,x:p.x|0,y:p.y|0,d:p.dir,ph:p.phase,r:p.rotation|0,a:p.age,h:p.hit,o:p.owner})),
      fx:g.fx.length>0?g.fx.slice(0,3).map(e=>({x:e.x|0,y:e.y|0,f:e.f,t:e.t})):[],
      sk:g.shake,gs:g.state,an:g.ann,at:g.annTimer,rd:g.round,w:g.wins,tm:g.timer,cm:g.canRematch||false,
      sn:g.snd.splice(0)};
  },[]);

  const setupConn=useCallback((conn,asHost)=>{
    connR.current=conn;
    conn.on("open",()=>{
      console.log("Connected! Host:",asHost);
      sfx.init();sfx.connect();
      if(asHost){
        G.current=newGame();
        G.current.ann="ROUND 1";G.current.annTimer=90;
        // After 90 frames (~1.5s) the annTimer will reach 0 and ann becomes "FIGHT!"
        // After another 60 frames ann clears and state stays "fighting"
      }
      setScreen("fight");setStatus("");
    });
    conn.on("data",onData);
    conn.on("close",()=>{setScreen("dc");setStatus("Opponent disconnected")});
    conn.on("error",e=>{console.error("Conn error:",e);setStatus("Error: "+e.type)});
  },[onData]);

  const create=useCallback(()=>{
    sfx.init();
    const code=String(Math.floor(1000+Math.random()*9000));
    setRoomCode(code);setRole("p1");isHost.current=true;
    setScreen("waiting");setStatus("Creating...");
    const peer=new Peer("ML-"+code,{debug:1});peerR.current=peer;
    peer.on("open",()=>setStatus("Waiting for opponent... Code: "+code));
    peer.on("connection",c=>setupConn(c,true));
    peer.on("error",e=>{if(e.type==="unavailable-id"){setStatus("Code taken");setScreen("lobby")}else setStatus("Error: "+e.type)});
  },[setupConn]);

  const join=useCallback((code)=>{
    if(!code||code.length!==4)return;
    sfx.init();
    setRole("p2");isHost.current=false;
    setScreen("waiting");setStatus("Connecting...");
    const peer=new Peer(undefined,{debug:1});peerR.current=peer;
    peer.on("open",()=>{
      const c=peer.connect("ML-"+code,{reliable:true});
      setupConn(c,false);
      setTimeout(()=>{if(!connR.current?.open){setStatus("Room not found");setScreen("lobby")}},8000);
    });
    peer.on("error",e=>{setStatus(e.type==="peer-unavailable"?"Room not found":"Error: "+e.type);setScreen("lobby")});
  },[setupConn]);

  useEffect(()=>()=>{connR.current?.close();peerR.current?.destroy()},[]);

  // ─── KEYBOARD INPUT ───
  useEffect(()=>{
    const keys={};
    const dn=e=>{
      if(e.target.tagName==="INPUT")return;
      const k=e.key===" "?" ":e.key.length===1?e.key.toLowerCase():e.key;
      if(!keys[k])btnTap.current[k]=true;
      keys[k]=true;
      btnDown.current[k]=true;
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)||"wasdfghjklt;".includes(k))e.preventDefault();
    };
    const up=e=>{
      if(e.target.tagName==="INPUT")return;
      const k=e.key===" "?" ":e.key.length===1?e.key.toLowerCase():e.key;
      keys[k]=false;
      btnDown.current[k]=false;
    };
    window.addEventListener("keydown",dn);
    window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up)};
  },[]);

  // ─── COMBAT HELPER (host only) ───
  const attack=(atk,def,type,g)=>{
    if(g.roundEnded)return;
    const cd=CHARS[atk.id];
    let dm=0,rc=50;
    if(type==="punch"){dm=cd.pd;rc=55}else if(type==="kick"){dm=cd.kd;rc=65}else if(type==="special"){dm=cd.sd;rc=80}
    if(Math.abs(atk.x-def.x)<rc+CW){
      if(def.isBlocking){dm*=(1-cd.br);g.shake=3;g.snd.push("block")}
      else{g.shake=type==="special"?10:5;def.combo++;def.comboTimer=60;g.snd.push(type==="special"?"special":"hit")}
      def.health=Math.max(0,def.health-dm);def.hitStun=type==="special"?15:8;
      atk.special=Math.min(100,atk.special+dm*.8);atk.dd+=dm;
      if(!atk.superReady&&!atk.superActive&&!atk.superUsed&&atk.dd>=def.maxHealth*.5){atk.superReady=true;g.snd.push("superReady")}
      g.fx.push({x:(atk.x+def.x)/2+CW/2,y:atk.y+30,f:0,t:type==="special"?"special":"normal"});
    }
  };

  // ─── GAME LOOP ───
  useEffect(()=>{
    if(screen!=="fight")return;
    const cv=cvR.current;if(!cv)return;
    const ctx=cv.getContext("2d");
    let aid,sendCtr=0;
    console.log("Game loop started! Host:",isHost.current);

    const loop=()=>{
      const fr=frameR.current++;
      let g=G.current;
      const host=isHost.current;
      const myRole=role;

      // Collect local input
      const held={...btnDown.current};
      const tap={...btnTap.current};
      btnTap.current={}; // consume taps

      // CLIENT: send inputs to host
      if(!host&&connR.current?.open){
        // Map generic mobile keys to P2 keys
        const h={},tp={};
        // Keyboard P2 keys pass through
        for(const k of["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","j","k","l",";"]){
          if(held[k])h[k]=true;if(tap[k])tp[k]=true;
        }
        // Mobile generic keys → P2
        if(held._left)h.ArrowLeft=true;if(held._right)h.ArrowRight=true;
        if(held._up)h.ArrowUp=true;if(held._down)h.ArrowDown=true;
        if(held._punch)h.j=true;if(held._kick)h.k=true;
        if(held._special)h.l=true;if(tap._super)tp[";"]=true;
        connR.current.send({t:"i",h,tp});
      }

      // HOST: simulate game
      if(host){
        // Announcement timer
        if(g.annTimer>0){
          g.annTimer--;
          if(g.annTimer===0&&(g.ann==="ROUND 1"||g.ann==="ROUND 2"||g.ann==="FINAL ROUND")){
            g.ann="FIGHT!";g.annTimer=60;g.snd.push("fight");
          }else if(g.annTimer===0&&g.ann==="FIGHT!"){
            g.ann="";
          }
        }

        // Gameover rematch check
        if(g.state==="gameover"&&g.canRematch){
          const anyInput=Object.values(held).some(v=>v)||Object.keys(tap).length>0||Object.values(remoteIn.current.held||{}).some(v=>v)||Object.keys(remoteIn.current.tap||{}).length>0;
          if(anyInput){
            const ng=newGame();ng.snd.push("roundStart");
            G.current=ng;g=G.current;
          }
        }

        if(g.state==="fighting"&&!g.roundEnded){
          // P1 input (host local + mobile generic)
          const p1h={...held};const p1t={...tap};
          if(p1h._left)p1h.a=true;if(p1h._right)p1h.d=true;
          if(p1h._up)p1h.w=true;if(p1h._down)p1h.s=true;
          if(p1h._punch)p1h.f=true;if(p1h._kick)p1h.g=true;
          if(p1h._special)p1h.h=true;if(p1t._super)p1t.t=true;

          // P2 input (from remote)
          const p2h=remoteIn.current.held;
          const p2t=remoteIn.current.tap;
          remoteIn.current.tap={}; // consume

          // P1 Gandhi movement
          if(g.p1.hitStun>0){g.p1.hitStun--}
          else{
            if(p1h.a)g.p1.x-=CHARS.gandhi.sp;
            if(p1h.d)g.p1.x+=CHARS.gandhi.sp;
            if(p1h.w&&!g.p1.isJumping){g.p1.vy=-14;g.p1.isJumping=true}
            g.p1.isBlocking=!!p1h.s;
            if(!g.p1.action||(g.p1.action==="super"&&g.p1.actionTimer<=0)){
              if(p1h.f){g.p1.action="punch";g.p1.actionTimer=12;g.snd.push("punch");attack(g.p1,g.p2,"punch",g)}
              else if(p1h.g){g.p1.action="kick";g.p1.actionTimer=18;g.snd.push("kick");attack(g.p1,g.p2,"kick",g)}
              else if(p1h.h&&g.p1.special>=100){g.p1.action="special";g.p1.actionTimer=30;g.p1.special=0;attack(g.p1,g.p2,"special",g)}
            }
            if(p1t.t){
              if(g.p1.superReady&&!g.p1.superActive&&!g.p1.superUsed){
                g.p1.superReady=false;g.p1.superActive=true;g.p1.superBoomerangs=2;g.p1.superUsed=true;g.snd.push("boomerang");
                const d=g.p1.facing;g.projectiles.push({type:"boomerang",owner:"p1",x:g.p1.x+CW/2+d*20,y:g.p1.y+30,dir:d,phase:"out",rotation:0,age:0,hit:false});
                g.p1.superBoomerangs=1;g.p1.action="super";g.p1.actionTimer=15;
              }else if(g.p1.superActive&&g.p1.superBoomerangs>0){
                g.snd.push("boomerang");const d=g.p1.facing;
                g.projectiles.push({type:"boomerang",owner:"p1",x:g.p1.x+CW/2+d*20,y:g.p1.y+40,dir:d,phase:"out",rotation:1.5,age:0,hit:false});
                g.p1.superBoomerangs--;g.p1.action="super";g.p1.actionTimer=15;
                if(g.p1.superBoomerangs<=0)setTimeout(()=>{g.p1.superActive=false},1500);
              }
            }
          }

          // P2 Bin Laden movement
          if(g.p2.hitStun>0){g.p2.hitStun--}
          else{
            if(p2h.ArrowLeft)g.p2.x-=CHARS.binladen.sp;
            if(p2h.ArrowRight)g.p2.x+=CHARS.binladen.sp;
            if(p2h.ArrowUp&&!g.p2.isJumping){g.p2.vy=-14;g.p2.isJumping=true}
            g.p2.isBlocking=!!p2h.ArrowDown;
            if(!g.p2.action||(g.p2.action==="super"&&g.p2.actionTimer<=0)){
              if(!g.p2.superActive){
                if(p2h.j){g.p2.action="punch";g.p2.actionTimer=12;g.snd.push("punch");attack(g.p2,g.p1,"punch",g)}
                else if(p2h.k){g.p2.action="kick";g.p2.actionTimer=18;g.snd.push("kick");attack(g.p2,g.p1,"kick",g)}
                else if(p2h.l&&g.p2.special>=100){g.p2.action="special";g.p2.actionTimer=30;g.p2.special=0;attack(g.p2,g.p1,"special",g)}
              }
            }
            if(p2t&&p2t[";"]){
              if(g.p2.superReady&&!g.p2.superActive&&!g.p2.superUsed){
                g.p2.superReady=false;g.p2.superActive=true;g.p2.superBullets=5;g.p2.superUsed=true;g.snd.push("gunshot");
                const d=g.p2.facing;g.projectiles.push({type:"bullet",owner:"p2",x:g.p2.x+CW/2+d*30,y:g.p2.y+33,dir:d,age:0,hit:false});
                g.p2.superBullets=4;g.p2.action="super";g.p2.actionTimer=10;
              }else if(g.p2.superActive&&g.p2.superBullets>0){
                g.snd.push("gunshot");const d=g.p2.facing;
                g.projectiles.push({type:"bullet",owner:"p2",x:g.p2.x+CW/2+d*30,y:g.p2.y+33,dir:d,age:0,hit:false});
                g.p2.superBullets--;g.p2.action="super";g.p2.actionTimer=10;
                if(g.p2.superBullets<=0)setTimeout(()=>{g.p2.superActive=false},300);
              }
            }
          }

          // Physics
          for(const p of[g.p1,g.p2]){
            p.vy+=GR;p.y+=p.vy;
            if(p.y>=GY-CH){p.y=GY-CH;p.vy=0;p.isJumping=false}
            p.x=Math.max(10,Math.min(W-CW-10,p.x));
            if(p.actionTimer>0){p.actionTimer--;if(p.actionTimer<=0&&(p.action!=="super"||!p.superActive))p.action=null}
            if(p.comboTimer>0){p.comboTimer--;if(p.comboTimer<=0)p.combo=0}
          }
          g.p1.facing=g.p1.x<g.p2.x?1:-1;g.p2.facing=g.p2.x<g.p1.x?1:-1;
          const ol=CW-Math.abs(g.p1.x-g.p2.x);
          if(ol>0&&Math.abs(g.p1.y-g.p2.y)<CH){const pu=ol/2;if(g.p1.x<g.p2.x){g.p1.x-=pu;g.p2.x+=pu}else{g.p1.x+=pu;g.p2.x-=pu}}
          g.p1.special=Math.min(100,g.p1.special+.05);g.p2.special=Math.min(100,g.p2.special+.05);
          updProj(g);

          // Timer
          g.timerAcc++;
          if(g.timerAcc>=60){g.timerAcc=0;if(g.timer>0)g.timer--}
          if(g.timer<=0&&!g.roundEnded){
            g.roundEnded=true;
            const w=g.p1.health>g.p2.health?"p1":g.p2.health>g.p1.health?"p2":"draw";
            endRound(g,w);
          }

          // KO check
          if(!g.roundEnded){
            if(g.p1.health<=0){g.roundEnded=true;endRound(g,"p2")}
            else if(g.p2.health<=0){g.roundEnded=true;endRound(g,"p1")}
          }

          if(fr%120===0)g.snd.push("bgDrone");
        }

        // Update effects
        g.fx=g.fx.map(e=>({...e,f:e.f+1})).filter(e=>e.f<20);
        if(g.shake>0)g.shake--;

        // Play SFX locally
        g.snd.forEach(s=>{if(sfx[s])sfx[s]()});

        // Send state to client
        sendCtr++;
        if(connR.current?.open&&sendCtr%2===0){
          try{connR.current.send(serialize())}catch(e){}
        }
        g.snd=[];
      }

      // ─── RENDER (both host & client) ───
      ctx.save();
      if(g.shake>0)ctx.translate((Math.random()-.5)*g.shake*3,(Math.random()-.5)*g.shake*3);
      ctx.clearRect(-10,-10,W+20,H+20);
      drawStage(ctx,fr);
      drawChar(ctx,g.p1,g.p1.facing,fr,g.p1.action,g.p1.isBlocking,g.p1.superReady,g.p1.superActive,0,g.p1.superBoomerangs);
      drawChar(ctx,g.p2,g.p2.facing,fr,g.p2.action,g.p2.isBlocking,g.p2.superReady,g.p2.superActive,g.p2.superBullets,0);
      drawProj(ctx,g.projectiles,fr);
      for(const e of g.fx)drawFx(ctx,e.x,e.y,e.f,e.t);
      drawHB(ctx,20,18,g.p1.health,g.p1.maxHealth,g.p1.special,CHARS.gandhi.name,CHARS.gandhi.accent,false,g.p1.superReady,g.p1.superActive,"BOOMERANG",g.p1.superBoomerangs);
      drawHB(ctx,500,18,g.p2.health,g.p2.maxHealth,g.p2.special,CHARS.binladen.name,CHARS.binladen.accent,true,g.p2.superReady,g.p2.superActive,"AK-47",g.p2.superBullets);
      // Timer box
      ctx.fillStyle="#111";ctx.fillRect(W/2-30,14,60,35);ctx.strokeStyle="#e8a926";ctx.lineWidth=2;ctx.strokeRect(W/2-30,14,60,35);
      ctx.fillStyle=g.timer<=10?"#ff3333":"#fff";ctx.font=`bold 18px ${PF}`;ctx.textAlign="center";ctx.fillText(String(g.timer),W/2,40);
      ctx.fillStyle="#888";ctx.font=`8px ${PF}`;ctx.fillText(`ROUND ${g.round}`,W/2,62);
      // Win dots
      for(let i=0;i<2;i++){ctx.fillStyle=i<g.wins.p1?"#e8a926":"#333";ctx.beginPath();ctx.arc(330+i*15,59,4,0,Math.PI*2);ctx.fill()}
      for(let i=0;i<2;i++){ctx.fillStyle=i<g.wins.p2?"#c0392b":"#333";ctx.beginPath();ctx.arc(455+i*15,59,4,0,Math.PI*2);ctx.fill()}
      // YOU indicator
      ctx.fillStyle=myRole==="p1"?"#e8a926":"#c0392b";ctx.font=`bold 9px ${PF}`;ctx.textAlign="center";
      ctx.fillText(myRole==="p1"?"← YOU":"YOU →",myRole==="p1"?160:640,H-8);
      // Announcement overlay
      if(g.ann){
        ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,H/2-40,W,80);
        ctx.fillStyle="#fff";ctx.font=`bold 28px ${PF}`;ctx.textAlign="center";
        ctx.fillText(g.ann,W/2,H/2+8);
        if(g.state==="gameover"&&g.canRematch&&Math.sin(fr*.08)>0){
          ctx.fillStyle="#e8a926";ctx.font=`9px ${PF}`;
          ctx.fillText("TAP ANY BUTTON FOR REMATCH",W/2,H/2+35);
        }
      }
      ctx.restore();
      aid=requestAnimationFrame(loop);
    };

    // Round end handler (called from within game loop)
    function endRound(g,winner){
      g.state="ko";g.ann="K.O.!";g.annTimer=150;g.snd.push("ko");
      const nw={...g.wins};if(winner!=="draw")nw[winner]++;g.wins=nw;
      setTimeout(()=>{
        if(nw.p1>=2||nw.p2>=2){
          g.ann=`${nw.p1>=2?CHARS.gandhi.name:CHARS.binladen.name} WINS!`;
          g.state="gameover";g.annTimer=9999;g.snd.push("win");
          // After 3s, allow rematch
          setTimeout(()=>{g.canRematch=true},3000);
        }else{
          const nr=g.round+1;
          const ng=newGame();ng.round=nr;ng.wins=nw;
          ng.ann=nr===3?"FINAL ROUND":`ROUND ${nr}`;ng.annTimer=90;
          ng.snd.push("roundStart");
          G.current=ng;
        }
      },2500);
    }

    aid=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(aid);
  },[screen,role,serialize]);

  // ─── MOBILE BUTTON HANDLERS ───
  const hold=(key,down)=>{btnDown.current={...btnDown.current,[key]:down}};
  const tap=(key)=>{btnTap.current={...btnTap.current,[key]:true}};

  const Btn=({label,k,color="#fff",sz=50})=>(
    <button
      onTouchStart={e=>{e.preventDefault();e.stopPropagation();hold(k,true)}}
      onTouchEnd={e=>{e.preventDefault();e.stopPropagation();hold(k,false)}}
      onTouchCancel={e=>{hold(k,false)}}
      onMouseDown={()=>hold(k,true)}
      onMouseUp={()=>hold(k,false)}
      onMouseLeave={()=>hold(k,false)}
      style={{width:sz,height:sz,borderRadius:10,border:`2px solid ${color}`,background:"rgba(0,0,0,0.8)",color,fontFamily:PF,fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"none",WebkitTouchCallout:"none"}}
    >{label}</button>
  );
  const TapBtn=({label,k,color="#fff",sz=50})=>(
    <button
      onTouchStart={e=>{e.preventDefault();e.stopPropagation();tap(k)}}
      onMouseDown={()=>tap(k)}
      style={{width:sz,height:sz,borderRadius:10,border:`2px solid ${color}`,background:`${color}22`,color,fontFamily:PF,fontSize:10,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"none",WebkitTouchCallout:"none"}}
    >{label}</button>
  );

  const cpLink=()=>{navigator.clipboard?.writeText(`${location.origin}${location.pathname}?room=${roomCode}`).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)})};

  // Mobile keys: P1 uses keyboard keys directly, P2 uses generic _keys
  const mk=role==="p1"
    ?{u:"w",d:"s",l:"a",r:"d",p:"f",k:"g",s:"h",su:"t"}
    :{u:"_up",d:"_down",l:"_left",r:"_right",p:"_punch",k:"_kick",s:"_special",su:"_super"};
  const mc=role==="p1"?"#e8a926":"#c0392b";
  const mn=role==="p1"?"GANDHI":"BIN LADEN";
  const bs={fontFamily:PF,cursor:"pointer",border:"none",borderRadius:8,fontWeight:"bold"};

  return(<div style={{background:"#000",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:PF,padding:8}}>

    {screen==="lobby"&&<div style={{maxWidth:400,width:"100%",textAlign:"center",padding:16}}>
      <div style={{color:"#ff2222",fontSize:20,marginBottom:4,textShadow:"0 0 20px #ff4444"}}>MORTAL</div>
      <div style={{color:"#ff2222",fontSize:20,marginBottom:12,textShadow:"0 0 20px #ff4444"}}>LEGENDS</div>
      <div style={{color:"#e8a926",fontSize:8,marginBottom:24}}>ONLINE MULTIPLAYER</div>
      <button onClick={create} style={{...bs,width:"100%",padding:"14px 0",fontSize:11,color:"#000",background:"#e8a926",marginBottom:14}}>CREATE ROOM (P1)</button>
      <div style={{color:"#888",fontSize:8,marginBottom:10}}>— OR JOIN —</div>
      <input value={joinCode} onChange={e=>setJoinCode(e.target.value.replace(/[^0-9]/g,"").slice(0,4))} onKeyDown={e=>{if(e.key==="Enter"&&joinCode.length===4)join(joinCode)}} placeholder="0000" maxLength={4} inputMode="numeric" style={{width:"100%",padding:14,fontSize:22,fontFamily:PF,background:"#111",border:"2px solid #444",borderRadius:8,color:"#fff",textAlign:"center",letterSpacing:10,marginBottom:8}}/>
      <button onClick={()=>join(joinCode)} disabled={joinCode.length!==4} style={{...bs,width:"100%",padding:"14px 0",fontSize:11,color:joinCode.length===4?"#fff":"#666",background:joinCode.length===4?"#c0392b":"#333"}}>JOIN ROOM (P2)</button>
      {status&&<div style={{color:"#ff4444",fontSize:8,marginTop:10}}>{status}</div>}
      <div style={{color:"#555",fontSize:6,marginTop:24,lineHeight:2}}>P1=GANDHI · P2=BIN LADEN<br/>WebRTC P2P · NO SERVER</div>
    </div>}

    {screen==="waiting"&&<div style={{maxWidth:400,width:"100%",textAlign:"center",padding:16}}>
      <div style={{color:"#e8a926",fontSize:13,marginBottom:16}}>WAITING FOR OPPONENT</div>
      {roomCode&&<>
        <div style={{color:"#888",fontSize:8,marginBottom:6}}>ROOM CODE:</div>
        <div style={{color:"#fff",fontSize:32,letterSpacing:10,marginBottom:14,textShadow:"0 0 20px #e8a926"}}>{roomCode}</div>
        <button onClick={cpLink} style={{...bs,padding:"8px 20px",fontSize:8,color:"#e8a926",background:"transparent",border:"2px solid #e8a926",borderRadius:8,marginBottom:12}}>{copied?"COPIED!":"COPY LINK"}</button>
      </>}
      <div style={{color:"#888",fontSize:8}}>{status}</div>
      <div style={{margin:"16px auto",width:20,height:20,border:"3px solid #e8a926",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <button onClick={()=>{connR.current?.close();peerR.current?.destroy();setScreen("lobby");setStatus("")}} style={{...bs,marginTop:16,padding:"6px 16px",fontSize:7,color:"#666",background:"transparent",border:"1px solid #333"}}>CANCEL</button>
    </div>}

    {screen==="fight"&&<>
      <div style={{border:`3px solid ${mc}`,borderRadius:6,padding:2,background:"#111",maxWidth:"100%",overflow:"hidden"}}>
        <canvas ref={cvR} width={W} height={H} style={{display:"block",maxWidth:"100%",height:"auto",imageRendering:"pixelated"}}/>
      </div>
      {isMobile&&<div style={{width:"100%",maxWidth:W,marginTop:8,padding:"0 4px"}}>
        <div style={{color:mc,fontSize:8,textAlign:"center",marginBottom:4}}>YOU: {mn}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <Btn label="▲" k={mk.u} color={mc}/>
            <div style={{display:"flex",gap:2}}>
              <Btn label="◄" k={mk.l} color={mc}/>
              <Btn label="BLK" k={mk.d} color="#888"/>
              <Btn label="►" k={mk.r} color={mc}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
            <Btn label="PNC" k={mk.p} color="#ff6644" sz={56}/>
            <Btn label="KCK" k={mk.k} color="#44aaff" sz={56}/>
            <Btn label="SPL" k={mk.s} color={mc} sz={56}/>
            <TapBtn label="★" k={mk.su} color="#ff8844" sz={56}/>
          </div>
        </div>
      </div>}
    </>}

    {screen==="dc"&&<div style={{textAlign:"center",padding:16}}>
      <div style={{color:"#ff4444",fontSize:13,marginBottom:12}}>DISCONNECTED</div>
      <div style={{color:"#888",fontSize:8,marginBottom:16}}>{status}</div>
      <button onClick={()=>{peerR.current?.destroy();setScreen("lobby");setStatus("")}} style={{...bs,padding:"10px 24px",fontSize:10,color:"#000",background:"#e8a926"}}>BACK TO LOBBY</button>
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Game/>);
</script>
</body>
</html>
