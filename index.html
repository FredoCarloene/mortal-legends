const{useState,useEffect,useRef,useCallback}=React;

// Fullscreen helper
function goFS(){
  const el=document.documentElement;
  try{
    if(el.requestFullscreen)el.requestFullscreen({navigationUI:"hide"});
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }catch(e){}
  try{screen.orientation?.lock?.("landscape").catch(()=>{})}catch(e){}
  setTimeout(()=>window.scrollTo(0,1),100);
}
function exitFS(){
  try{
    if(document.exitFullscreen)document.exitFullscreen();
    else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
  }catch(e){}
}
function isFullscreen(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
const W=800,H=400,GY=320,GR=0.8,CW=60,CH=90,RT=99,FRAME_MS=1000/60,MAX_SIM_STEPS=6,ROLLBACK_WINDOW=180,ROLLBACK_BUFFER_SIZE=512,SYNC_START_DELAY_MS=120,LOCAL_INPUT_DELAY=2,MAX_PREDICTION_FRAMES=8,INPUT_PACKET_HISTORY=12,READY_RESEND_MS=250;
const IB={L:1,R:2,U:4,D:8,P:16,K:32,S:64,SU:128};
const CHARS={gandhi:{name:"GANDHI",accent:"#e8a926",pd:3,kd:5,sd:14,sp:3.2,br:0.75},binladen:{name:"BIN LADEN",accent:"#c0392b",pd:2,kd:3,sd:10,sp:4.5,br:0.75}};
const PF="'Press Start 2P',monospace";
const ROCKET_FX_OFFSETS=[[-18,-10],[-8,8],[0,0],[10,-6],[18,10]];
const PK_READY=1,PK_INPUT=2;
const hasBit=(mask,bit)=>(mask&bit)!==0;
const lerp=(a,b,t)=>a+(b-a)*t;
const frameSlot=frame=>frame&(ROLLBACK_BUFFER_SIZE-1);
function cloneGameState(g){
  return{
    ...g,
    p1:{...g.p1},
    p2:{...g.p2},
    wins:{...g.wins},
    projectiles:g.projectiles.map(p=>({...p})),
    fx:g.fx.map(e=>({...e})),
    snd:[]
  };
}
function copyGameStateInto(dst,g){
  if(!dst)return cloneGameState(g);
  Object.assign(dst,g);
  Object.assign(dst.p1,g.p1);
  Object.assign(dst.p2,g.p2);
  dst.wins.p1=g.wins.p1;
  dst.wins.p2=g.wins.p2;
  dst.projectiles.length=g.projectiles.length;
  for(let i=0;i<g.projectiles.length;i++){
    if(dst.projectiles[i])Object.assign(dst.projectiles[i],g.projectiles[i]);
    else dst.projectiles[i]={...g.projectiles[i]};
  }
  dst.fx.length=g.fx.length;
  for(let i=0;i<g.fx.length;i++){
    if(dst.fx[i])Object.assign(dst.fx[i],g.fx[i]);
    else dst.fx[i]={...g.fx[i]};
  }
  dst.snd.length=0;
  return dst;
}
function makeReadyPacket(){
  return new Uint8Array([PK_READY]).buffer;
}
function makeInputPacket(frame,getMask){
  const count=Math.min(INPUT_PACKET_HISTORY,frame+1);
  const buf=new Uint8Array(6+count);
  const view=new DataView(buf.buffer);
  buf[0]=PK_INPUT;
  buf[1]=count;
  view.setUint32(2,frame);
  for(let i=0;i<count;i++){
    const sampleFrame=frame-count+1+i;
    buf[6+i]=(getMask(sampleFrame)??0)&0xff;
  }
  return buf.buffer;
}
function asPacketBytes(data){
  if(data instanceof ArrayBuffer)return new Uint8Array(data);
  if(ArrayBuffer.isView(data))return new Uint8Array(data.buffer,data.byteOffset,data.byteLength);
  return null;
}

// SFX
const AC=window.AudioContext||window.webkitAudioContext;
class Sfx{
  constructor(){this.c=null;this.g=null;this.m=false}
  init(){
    if(this.c&&this.c.state==="running")return;
    if(this.c&&this.c.state==="suspended"){this.c.resume();return}
    try{
      this.c=new AC();this.g=this.c.createGain();this.g.gain.value=0.35;this.g.connect(this.c.destination);
      // iOS Safari unlock: play a silent buffer
      const b=this.c.createBuffer(1,1,22050);const s=this.c.createBufferSource();s.buffer=b;s.connect(this.c.destination);s.start(0);
    }catch(e){}
  }
  o(t,f,d,v=0.3){if(!this.c||this.m)return;const o=this.c.createOscillator(),g=this.c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.c.currentTime+d);o.connect(g);g.connect(this.g);o.start();o.stop(this.c.currentTime+d)}
  n(d,v=0.15){if(!this.c||this.m)return;const l=this.c.sampleRate*d,b=this.c.createBuffer(1,l,this.c.sampleRate),a=b.getChannelData(0);for(let i=0;i<l;i++)a[i]=Math.random()*2-1;const s=this.c.createBufferSource();s.buffer=b;const g=this.c.createGain();g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.c.currentTime+d);const f=this.c.createBiquadFilter();f.type="highpass";f.frequency.value=800;s.connect(f);f.connect(g);g.connect(this.g);s.start();s.stop(this.c.currentTime+d)}
  punch(){this.n(.08,.25);this.o("square",200,.06,.2)}
  kick(){this.o("sine",100,.15,.35);this.n(.1,.2)}
  special(){for(let i=0;i<5;i++)setTimeout(()=>this.o("sawtooth",300+i*120,.2,.2),i*40);this.n(.3,.15)}
  block(){this.o("triangle",300,.1,.15)}
  hit(){this.n(.06,.3);this.o("square",150,.08,.2)}
  ko(){[600,500,400,300,200].forEach((f,i)=>setTimeout(()=>this.o("square",f,.3,.2),i*100))}
  roundStart(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.o("square",f,.15,.15),i*100))}
  fight(){this.o("sawtooth",400,.1,.2);setTimeout(()=>this.o("square",1000,.3,.2),80)}
  win(){[523,659,784,880,1047,1175,1319,1568].forEach((f,i)=>setTimeout(()=>this.o("square",f,.2,.12),i*120))}
  superReady(){[800,1000,1200,1600].forEach((f,i)=>setTimeout(()=>this.o("sawtooth",f,.12,.18),i*60))}
  boomerang(){for(let i=0;i<8;i++)setTimeout(()=>this.o("triangle",500+i*60,.1,.15),i*30);this.n(.2,.1)}
  gunshot(){this.n(.12,.4);this.o("square",60,.15,.3);this.o("sawtooth",150,.08,.2)}
  rocketLaunch(){this.o("sawtooth",80,.3,.35);this.n(.15,.3);setTimeout(()=>this.o("sine",60,.2,.2),50)}
  rocketExplode(){this.n(.2,.4);this.o("square",40,.3,.3);this.o("sawtooth",100,.15,.25);setTimeout(()=>this.n(.15,.2),80)}
  bgDrone(){if(this.c&&!this.m)this.o("sine",55,2,.04)}
  connect(){this.o("sine",880,.15,.2);setTimeout(()=>this.o("sine",1320,.15,.2),100)}
}
const sfx=new Sfx();

// Projectiles (mutates game state g)
function updProj(g){
  g.projectiles=g.projectiles.filter(p=>{
    p.age++;const tg=p.owner==="p1"?g.p2:g.p1,tx=tg.x+CW/2,ty=tg.y+CH/2;
    if(p.type==="boomerang"){
      if(p.phase==="out"){const dx=tx-p.x;p.x+=dx>0?Math.min(8,dx):Math.max(-8,dx);p.y+=(ty-p.y)*.05;p.rotation+=.5;if(Math.abs(dx)<15||p.age>80)p.phase="back"}
      else{const ow=p.owner==="p1"?g.p1:g.p2,ox=ow.x+CW/2,dx=ox-p.x;p.x+=dx>0?Math.min(9,dx):Math.max(-9,dx);p.y+=((ow.y+35)-p.y)*.08;p.rotation+=.5;if(Math.abs(dx)<20)return false}
      if(Math.abs(p.x-tx)<35&&Math.abs(p.y-ty)<50&&!p.hit){p.hit=true;const dm=tg.isBlocking?2:10;tg.health=Math.max(0,tg.health-dm);tg.hitStun=12;g.shake=6;g.fx.push({x:tx,y:tg.y+30,f:0,t:"special"});g.snd.push(tg.isBlocking?"block":"hit");(p.owner==="p1"?g.p1:g.p2).dd+=dm}
      return p.age<150;
    }else if(p.type==="rocket"){
      p.x+=p.dir*6;p.rotation=(p.rotation||0)+0.02*p.dir;
      if(Math.abs(p.x-tx)<35&&Math.abs(p.y-ty)<50&&!p.hit){p.hit=true;const dm=tg.isBlocking?2:8;tg.health=Math.max(0,tg.health-dm);tg.hitStun=14;g.shake=12;g.flash=4;g.freeze=4;
        // Knockback from explosion
        tg.vx=(tg.x>p.x?1:-1)*15;tg.vy=-5;
        // Deterministic burst offsets keep rollback resimulation identical on both peers.
        for(const[oX,oY]of ROCKET_FX_OFFSETS)g.fx.push({x:tx+oX,y:tg.y+20+oY,f:0,t:"special"});
        g.snd.push(tg.isBlocking?"block":"rocketExplode");(p.owner==="p1"?g.p1:g.p2).dd+=dm;return false}
      return p.x>-20&&p.x<W+20;
    }
    return false;
  });
}

// Drawing functions
function drawProj(c,proj,fr){for(const p of proj){if(p.type==="boomerang"){c.save();c.translate(p.x,p.y);c.rotate(p.rotation);c.shadowColor="#e8a926";c.shadowBlur=12;c.fillStyle="#e8a926";c.fillRect(-20,-3,40,6);c.fillStyle="#fff";c.fillRect(-18,-1,8,2);c.fillRect(10,-1,8,2);c.shadowBlur=0;c.fillStyle=`rgba(232,169,38,${.3+Math.sin(fr*.3)*.15})`;c.beginPath();c.arc(0,0,18,0,Math.PI*2);c.fill();c.restore()}else if(p.type==="rocket"){c.save();c.translate(p.x,p.y);
  // Flame trail
  const fl=4+Math.sin(fr*.5)*3;
  c.fillStyle=`rgba(255,100,0,${.7+Math.sin(fr*.4)*.2})`;c.beginPath();c.moveTo(p.dir>0?-10:-10,0);c.lineTo(p.dir>0?-24-fl:24+fl,-4-Math.random()*3);c.lineTo(p.dir>0?-24-fl:24+fl,4+Math.random()*3);c.fill();
  c.fillStyle="#ffcc00";c.beginPath();c.moveTo(p.dir>0?-8:-8,0);c.lineTo(p.dir>0?-16:16,-2);c.lineTo(p.dir>0?-16:16,2);c.fill();
  // Rocket body
  c.fillStyle="#555";c.fillRect(-8,-4,16,8);
  // Nose cone
  c.fillStyle="#c0392b";c.beginPath();c.moveTo(p.dir>0?8:-8,-4);c.lineTo(p.dir>0?16:-16,0);c.lineTo(p.dir>0?8:-8,4);c.fill();
  // Fins
  c.fillStyle="#444";c.fillRect(p.dir>0?-8:-4,-7,5,3);c.fillRect(p.dir>0?-8:-4,4,5,3);
  c.shadowColor="#ff4400";c.shadowBlur=12;c.fillStyle="rgba(255,80,0,0.4)";c.beginPath();c.arc(0,0,14,0,Math.PI*2);c.fill();c.shadowBlur=0;
  c.restore()}}}

function drawChar(c,pl,fac,fr,act,blk,sr,sa,sb,sm){
  const{x,y}=pl,isG=pl.id==="gandhi";c.save();c.translate(x+CW/2,y);if(fac===-1)c.scale(-1,1);

  if(sa){const p=Math.sin(fr*.25)*.2+.4;c.fillStyle=isG?`rgba(232,169,38,${p})`:`rgba(192,57,43,${p})`;c.beginPath();c.arc(0,45,35,0,Math.PI*2);c.fill()}
  if(isG)dG(c,b,act,blk,fr,sa,sr,sm);else dB(c,b,act,blk,fr,sa,sb,sr);c.restore();
}

function dG(c,b,a,bl,fr,sa,sr,sm){
  c.fillStyle="#f5f0e0";c.fillRect(-15,25+b,30,45);c.fillStyle="#e8dcc0";c.fillRect(-18,40+b,6,30);

  else{c.fillStyle="#8B7355";c.fillRect(-12,70+b,8,18);c.fillRect(4,70+b,8,18);c.fillStyle="#654321";c.fillRect(-14,86+b,12,4);c.fillRect(2,86+b,12,4)}
  c.fillStyle="#C4956A";c.beginPath();c.arc(0,18+b,16,0,Math.PI*2);c.fill();

  c.fillStyle="#222";c.fillRect(-7,15+b,3,3);c.fillRect(5,15+b,3,3);
  c.strokeStyle="#8B6914";c.lineWidth=1;c.beginPath();c.arc(0,20+b,5,.1,Math.PI-.1);c.stroke();
  c.fillStyle="#C4956A";c.beginPath();c.ellipse(-15,18+b,4,6,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(15,18+b,4,6,0,0,Math.PI*2);c.fill();
  if(sr||sa){const n=sa?(sm||0):2;for(let i=0;i<n;i++){c.save();c.translate(-8+i*16,-8+b+Math.sin(fr*.2+i)*2);c.rotate(fr*.1);c.fillStyle="#e8a926";c.shadowColor="#e8a926";c.shadowBlur=4;c.fillRect(-6,-1.5,12,3);c.shadowBlur=0;c.restore()}}

  else if(a==="punch"){c.fillStyle="#C4956A";c.fillRect(15,30+b,30,8);c.fillStyle="#8B6914";c.fillRect(40,25+b,4,25)}

  else if(bl){c.fillStyle="#C4956A";c.fillRect(-5,28+b,25,8);c.fillRect(-20,32+b,25,8);c.strokeStyle="rgba(232,169,38,0.6)";c.lineWidth=2;c.beginPath();c.arc(0,45+b,25,0,Math.PI*2);c.stroke()}
  else{c.fillStyle="#C4956A";c.fillRect(15,30+b,12,8);c.fillRect(-27,30+b,12,8);if(!sa){c.fillStyle="#8B6914";c.fillRect(22,25+b,3,50)}}

  c.fillStyle="#f0f0f0";c.beginPath();c.arc(0,12+b,17,-Math.PI,0);c.fill();c.fillRect(-17,5+b,34,10);
  c.fillStyle="#C4956A";c.beginPath();c.arc(0,18+b,14,0,Math.PI);c.fill();c.fillRect(-14,12+b,28,10);
  c.fillStyle="#444";c.beginPath();c.moveTo(-10,22+b);c.lineTo(10,22+b);c.lineTo(6,35+b);c.lineTo(0,38+b);c.lineTo(-6,35+b);c.closePath();c.fill();
  c.fillStyle="#fff";c.fillRect(-8,14+b,6,4);c.fillRect(2,14+b,6,4);c.fillStyle="#111";c.fillRect(-6,15+b,3,3);c.fillRect(3,15+b,3,3);

  if(sr||sa){const lv=sa?(sb||0):5;for(let i=0;i<5;i++){const ix=-16+i*8,iy=-8+b+Math.sin(fr*.15+i*.5)*1.5;c.fillStyle=i<lv?"#e8a926":"#333";c.shadowColor=i<lv?"#e8a926":"transparent";c.shadowBlur=i<lv?3:0;c.beginPath();c.arc(ix,iy,2.5,0,Math.PI*2);c.fill();c.fillRect(ix-1,iy+2,2,4);c.shadowBlur=0}}
  if(sa){c.fillStyle="#4a4a4a";c.fillRect(10,32+b,15,8);c.fillStyle="#555";c.fillRect(20,30+b,35,6);c.fillStyle="#666";c.fillRect(50,29+b,8,3);if(a==="super"&&fr%4<2){c.fillStyle="#ffaa00";c.beginPath();c.arc(60,31+b,6,0,Math.PI*2);c.fill()}}

function drawStage(c,fr){
  const sg=c.createLinearGradient(0,0,0,GY);sg.addColorStop(0,"#0a0a2e");sg.addColorStop(.5,"#1a0a3e");sg.addColorStop(1,"#2d1b69");c.fillStyle=sg;c.fillRect(0,0,W,GY);
  c.fillStyle="#1a1040";c.beginPath();c.moveTo(0,GY);for(let x=0;x<=W;x+=40)c.lineTo(x,GY-60-Math.sin(x*.02)*30-Math.cos(x*.01)*20);c.lineTo(W,GY);c.fill();
  c.fillStyle="#ffe4b5";c.shadowColor="#ffe4b5";c.shadowBlur=30;c.beginPath();c.arc(650,60,25,0,Math.PI*2);c.fill();c.shadowBlur=0;
  for(let i=0;i<30;i++){const sx=(i*137.5)%W,sy=(i*73.1)%(GY-80);c.fillStyle=`rgba(255,255,255,${.3+(Math.sin(fr*.1+i)*.5+.5)*.7})`;c.fillRect(sx,sy,2,2)}
  for(const tx of[80,720]){c.fillStyle="#5a3a1a";c.fillRect(tx-3,GY-80,6,80);const fl=Math.sin(fr*.3+tx)*3;c.fillStyle="#ff6600";c.beginPath();c.ellipse(tx,GY-85,8+fl,15+fl,0,0,Math.PI*2);c.fill();c.fillStyle="#ffaa00";c.beginPath();c.ellipse(tx,GY-88,4+fl*.5,8+fl*.5,0,0,Math.PI*2);c.fill()}
  const gg=c.createLinearGradient(0,GY,0,H);gg.addColorStop(0,"#4a3520");gg.addColorStop(1,"#1a1005");c.fillStyle=gg;c.fillRect(0,GY,W,H-GY);
  c.strokeStyle="#6a4530";c.lineWidth=2;c.beginPath();c.moveTo(0,GY);c.lineTo(W,GY);c.stroke();
}

function drawHB(c,x,y,hp,mx,sp,nm,ac,isR,sr,sa,sl,sc){
  const bW=280,bH=20,r=Math.max(0,hp/mx),sR=Math.min(1,sp/100);
  c.fillStyle="rgba(0,0,0,0.5)";c.fillRect(isR?x+bW-120:x,y-20,120,16);
  c.fillStyle="#fff";c.font=`bold 11px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(nm,isR?x+bW:x,y-8);
  c.fillStyle="#222";c.fillRect(x,y,bW,bH);
  const hg=c.createLinearGradient(x,y,x+bW,y);
  if(r>.5){hg.addColorStop(0,"#00cc44");hg.addColorStop(1,"#00ff55")}else if(r>.25){hg.addColorStop(0,"#ccaa00");hg.addColorStop(1,"#ffcc00")}else{hg.addColorStop(0,"#cc2200");hg.addColorStop(1,"#ff3300")}
  c.fillStyle=hg;if(isR)c.fillRect(x+bW*(1-r),y,bW*r,bH);else c.fillRect(x,y,bW*r,bH);
  c.strokeStyle=ac;c.lineWidth=2;c.strokeRect(x,y,bW,bH);
  c.fillStyle="#fff";c.font=`10px ${PF}`;c.textAlign="center";c.fillText(`${Math.ceil(hp)}`,x+bW/2,y+14);
  const sY=y+bH+4;c.fillStyle="#111";c.fillRect(x,sY,bW,7);c.fillStyle=ac;
  if(isR)c.fillRect(x+bW*(1-sR),sY,bW*sR,7);else c.fillRect(x,sY,bW*sR,7);
  c.strokeStyle="#555";c.lineWidth=1;c.strokeRect(x,sY,bW,7);
  if(sR>=1){c.fillStyle=ac;c.font=`7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText("SPECIAL READY!",isR?x+bW:x,sY+17)}
  if(sa){c.fillStyle="#ff4444";c.font=`bold 7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(`${sl} [${sc}]`,isR?x+bW:x,sY+28)}
  else if(sr){c.fillStyle=ac;c.font=`bold 7px ${PF}`;c.textAlign=isR?"right":"left";c.fillText(`★ ${sl}`,isR?x+bW:x,sY+28)}
}

function drawFx(c,x,y,f,t){if(f>15)return;const a=1-f/15,s=10+f*3;if(t==="special"){c.fillStyle=`rgba(255,200,50,${a})`;c.beginPath();c.arc(x,y,s*2,0,Math.PI*2);c.fill()}else{c.fillStyle=`rgba(255,255,255,${a})`;c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.fill()}}

// ─── MAIN COMPONENT ───
function ActiveGame(){
  const cvR=useRef(null);
  const[screen,setScreen]=useState("splash");
  const[roomCode,setRoomCode]=useState("");
  const[joinCode,setJoinCode]=useState("");
  const[role,setRole]=useState(null);
  const[status,setStatus]=useState("");
  const[isMobile,setIsMobile]=useState(false);
  const[copied,setCopied]=useState(false);
  const[isFS,setIsFS]=useState(false);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(/Macintosh/.test(navigator.userAgent)&&"ontouchend"in document);

  const connR=useRef(null);
  const peerR=useRef(null);
  const renderFrameR=useRef(0);
  const simFrameR=useRef(0);
  const sampleFrameR=useRef(0);
  const localReadyFrameR=useRef(0);
  const clockR=useRef({last:0,acc:0});
  const roleR=useRef(null);
  const localInputsR=useRef(new Uint8Array(ROLLBACK_BUFFER_SIZE));
  const localInputFramesR=useRef(new Int32Array(ROLLBACK_BUFFER_SIZE).fill(-1));
  const remoteInputsR=useRef(new Uint8Array(ROLLBACK_BUFFER_SIZE));
  const remoteInputFramesR=useRef(new Int32Array(ROLLBACK_BUFFER_SIZE).fill(-1));
  const usedRemoteInputsR=useRef(new Uint8Array(ROLLBACK_BUFFER_SIZE));
  const usedRemoteFramesR=useRef(new Int32Array(ROLLBACK_BUFFER_SIZE).fill(-1));
  const stateHistoryR=useRef(new Array(ROLLBACK_BUFFER_SIZE).fill(null));
  const stateHistoryFramesR=useRef(new Int32Array(ROLLBACK_BUFFER_SIZE).fill(-1));
  const rollbackStateR=useRef(null);
  const lastRemoteMaskR=useRef(0);
  const latestRemoteFrameR=useRef(-1);
  const confirmedRemoteFrameR=useRef(-1);
  const remoteReadyR=useRef(false);
  const startAtR=useRef(null);
  const lastReadySendR=useRef(0);

  useEffect(()=>{setIsMobile(window.innerWidth<900||"ontouchstart"in window)},[]);
  useEffect(()=>{const p=new URLSearchParams(window.location.search);const c=p.get("room");if(c&&c.length===4)setJoinCode(c)},[]);
  useEffect(()=>{roleR.current=role},[role]);
  useEffect(()=>{
    const fn=()=>setIsFS(isFullscreen());
    document.addEventListener("fullscreenchange",fn);
    document.addEventListener("webkitfullscreenchange",fn);
    return()=>{document.removeEventListener("fullscreenchange",fn);document.removeEventListener("webkitfullscreenchange",fn)};
  },[]);

  const btnDown=useRef({});
  const btnTap=useRef({});

  const mkP=(id,x,f)=>({id,x,y:GY-CH,vy:0,vx:0,health:100,maxHealth:100,special:0,action:null,actionTimer:0,facing:f,isJumping:false,isBlocking:false,combo:0,comboTimer:0,hitStun:0,dd:0,superReady:false,superActive:false,superBullets:0,superBoomerangs:0,superUsed:false,superDeactivateFrame:null,lastDir:0,lastDirTime:0});
  const newGame=(round=1,wins={p1:0,p2:0})=>({p1:mkP("gandhi",150,1),p2:mkP("binladen",550,-1),fx:[],shake:0,freeze:0,flash:0,projectiles:[],snd:[],state:"fighting",ann:round===3?"FINAL ROUND":`ROUND ${round}`,annTimer:90,round,wins:{...wins},timer:RT,timerAcc:0,roundEnded:false,canRematch:false,nextRoundFrame:null,rematchEnableFrame:null});
  const G=useRef(newGame());

  const resetSession=useCallback(()=>{
    G.current=newGame();
    renderFrameR.current=0;
    simFrameR.current=0;
    sampleFrameR.current=0;
    localReadyFrameR.current=LOCAL_INPUT_DELAY-1;
    clockR.current={last:0,acc:0};
    localInputsR.current.fill(0);
    localInputFramesR.current.fill(-1);
    remoteInputsR.current.fill(0);
    remoteInputFramesR.current.fill(-1);
    usedRemoteInputsR.current.fill(0);
    usedRemoteFramesR.current.fill(-1);
    stateHistoryR.current.fill(null);
    stateHistoryFramesR.current.fill(-1);
    rollbackStateR.current=null;
    for(let frame=0;frame<LOCAL_INPUT_DELAY;frame++){
      const slot=frameSlot(frame);
      localInputFramesR.current[slot]=frame;
      localInputsR.current[slot]=0;
      remoteInputFramesR.current[slot]=frame;
      remoteInputsR.current[slot]=0;
      usedRemoteFramesR.current[slot]=frame;
      usedRemoteInputsR.current[slot]=0;
    }
    const slot=frameSlot(0);
    stateHistoryR.current[slot]=copyGameStateInto(stateHistoryR.current[slot],G.current);
    stateHistoryFramesR.current[slot]=0;
    lastRemoteMaskR.current=0;
    latestRemoteFrameR.current=LOCAL_INPUT_DELAY-1;
    confirmedRemoteFrameR.current=LOCAL_INPUT_DELAY-1;
    remoteReadyR.current=false;
    startAtR.current=null;
    lastReadySendR.current=0;
    btnTap.current={};
  },[]);

  const getLocalInput=useCallback(frame=>{
    const slot=frameSlot(frame);
    return localInputFramesR.current[slot]===frame?localInputsR.current[slot]:0;
  },[]);
  const setLocalInput=useCallback((frame,mask)=>{
    const slot=frameSlot(frame);
    localInputFramesR.current[slot]=frame;
    localInputsR.current[slot]=mask&0xff;
  },[]);
  const hasRemoteInput=useCallback(frame=>remoteInputFramesR.current[frameSlot(frame)]===frame,[]);
  const getRemoteInput=useCallback((frame,fallback=0)=>{
    const slot=frameSlot(frame);
    return remoteInputFramesR.current[slot]===frame?remoteInputsR.current[slot]:fallback;
  },[]);
  const setRemoteInput=useCallback((frame,mask)=>{
    const slot=frameSlot(frame);
    remoteInputFramesR.current[slot]=frame;
    remoteInputsR.current[slot]=mask&0xff;
  },[]);
  const getUsedRemoteInput=useCallback((frame,fallback=0)=>{
    const slot=frameSlot(frame);
    return usedRemoteFramesR.current[slot]===frame?usedRemoteInputsR.current[slot]:fallback;
  },[]);
  const setUsedRemoteInput=useCallback((frame,mask)=>{
    const slot=frameSlot(frame);
    usedRemoteFramesR.current[slot]=frame;
    usedRemoteInputsR.current[slot]=mask&0xff;
  },[]);
  const getStateSnapshot=useCallback(frame=>{
    const slot=frameSlot(frame);
    return stateHistoryFramesR.current[slot]===frame?stateHistoryR.current[slot]:null;
  },[]);
  const saveStateSnapshot=useCallback((frame,g)=>{
    const slot=frameSlot(frame);
    stateHistoryR.current[slot]=copyGameStateInto(stateHistoryR.current[slot],g);
    stateHistoryFramesR.current[slot]=frame;
  },[]);
  const advanceConfirmedRemoteFrame=useCallback(()=>{
    let frame=confirmedRemoteFrameR.current+1;
    while(hasRemoteInput(frame))frame++;
    confirmedRemoteFrameR.current=frame-1;
  },[hasRemoteInput]);

  const encodeLocalInput=useCallback(()=>{
    const held=btnDown.current;
    const tap=btnTap.current;
    const myRole=roleR.current;
    if(!myRole)return 0;
    let mask=0;
    if(myRole==="p1"){
      if(held.a||held._left)mask|=IB.L;
      if(held.d||held._right)mask|=IB.R;
      if(held.w||held._up)mask|=IB.U;
      if(held.s||held._down)mask|=IB.D;
      if(held.f||held._punch)mask|=IB.P;
      if(held.g||held._kick)mask|=IB.K;
      if(held.h||held._special)mask|=IB.S;
      if(tap.t||tap._super)mask|=IB.SU;
    }else{
      if(held.ArrowLeft||held._left)mask|=IB.L;
      if(held.ArrowRight||held._right)mask|=IB.R;
      if(held.ArrowUp||held._up)mask|=IB.U;
      if(held.ArrowDown||held._down)mask|=IB.D;
      if(held.j||held._punch)mask|=IB.P;
      if(held.k||held._kick)mask|=IB.K;
      if(held.l||held._special)mask|=IB.S;
      if(tap[";"]||tap._super)mask|=IB.SU;
    }
    btnTap.current={};
    return mask;
  },[]);

  useEffect(()=>{
    const keys={};
    const dn=e=>{
      if(e.target.tagName==="INPUT")return;
      const k=e.key===" "?" ":e.key.length===1?e.key.toLowerCase():e.key;
      if(!keys[k])btnTap.current[k]=true;
      keys[k]=true;
      btnDown.current[k]=true;
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)||"wasdfghjklt;".includes(k))e.preventDefault();
    };
    const up=e=>{
      if(e.target.tagName==="INPUT")return;
      const k=e.key===" "?" ":e.key.length===1?e.key.toLowerCase():e.key;
      keys[k]=false;
      btnDown.current[k]=false;
    };
    window.addEventListener("keydown",dn);
    window.addEventListener("keyup",up);
    return()=>{window.removeEventListener("keydown",dn);window.removeEventListener("keyup",up)};
  },[]);

  const attack=useCallback((atk,def,type,g)=>{
    if(g.roundEnded)return;
    const cd=CHARS[atk.id];
    let dm=0,rc=50,kb=0,freeze=0;
    if(type==="punch"){dm=cd.pd;rc=55;kb=6;freeze=2}
    else if(type==="kick"){dm=cd.kd;rc=65;kb=10;freeze=3}
    else if(type==="special"){dm=cd.sd;rc=80;kb=18;freeze=5}
    if(Math.abs(atk.x-def.x)<rc+CW){
      const dir=atk.x<def.x?1:-1;
      if(def.isBlocking){
        dm*=(1-cd.br);g.shake=3;g.snd.push("block");
        def.vx=dir*4;atk.vx=-dir*2;
        freeze=1;
      }else{
        const comboMul=Math.min(1.5,1+def.combo*0.1);
        g.shake=Math.round((type==="special"?12:6)*comboMul);
        g.flash=type==="special"?4:2;
        g.freeze=Math.round(freeze*comboMul);
        def.combo++;def.comboTimer=90;
        def.vx=dir*kb*comboMul;
        def.vy=type==="special"?-4:type==="kick"?-2:0;
        atk.vx=-dir*2;
        g.snd.push(type==="special"?"special":"hit");
      }
      def.health=Math.max(0,def.health-dm);
      def.hitStun=type==="special"?18:type==="kick"?12:8;
      atk.special=Math.min(100,atk.special+dm*0.8);atk.dd+=dm;
      if(!atk.superReady&&!atk.superActive&&!atk.superUsed&&atk.dd>=def.maxHealth*0.5){atk.superReady=true;g.snd.push("superReady")}
      g.fx.push({x:(atk.x+def.x)/2+CW/2,y:atk.y+30,f:0,t:type==="special"?"special":"normal"});
    }
  },[]);

  const stepFrame=useCallback((g,p1Mask,p2Mask,fr)=>{
    const startNextRound=(round,wins)=>{const ng=newGame(round,wins);ng.snd.push("roundStart");return ng};
    const finishRound=(winner)=>{
      g.state="ko";g.ann="K.O.!";g.annTimer=150;g.snd.push("ko");
      if(winner!=="draw")g.wins={...g.wins,[winner]:g.wins[winner]+1};
      g.nextRoundFrame=fr+150;g.roundEnded=true;
    };

    if(g.rematchEnableFrame!=null&&fr>=g.rematchEnableFrame){
      g.canRematch=true;
      g.rematchEnableFrame=null;
    }
    if(g.nextRoundFrame!=null&&fr>=g.nextRoundFrame){
      g.nextRoundFrame=null;
      if(g.wins.p1>=2||g.wins.p2>=2){
        g.ann=`${g.wins.p1>=2?CHARS.gandhi.name:CHARS.binladen.name} WINS!`;
        g.state="gameover";
        g.annTimer=-1;
        g.rematchEnableFrame=fr+180;
        g.snd.push("win");
      }else{
        g=startNextRound(g.round+1,g.wins);
      }
    }

    if(g.annTimer>0){
      g.annTimer--;
      if(g.annTimer===0&&(g.ann==="ROUND 1"||g.ann==="ROUND 2"||g.ann==="FINAL ROUND")){
        g.ann="FIGHT!";g.annTimer=60;g.snd.push("fight");
      }else if(g.annTimer===0&&g.ann==="FIGHT!"){
        g.ann="";
      }
    }

    if(g.p1.superDeactivateFrame!=null&&fr>=g.p1.superDeactivateFrame){g.p1.superActive=false;g.p1.superDeactivateFrame=null}
    if(g.p2.superDeactivateFrame!=null&&fr>=g.p2.superDeactivateFrame){g.p2.superActive=false;g.p2.superDeactivateFrame=null}

    if(g.state==="gameover"&&g.canRematch&&(p1Mask||p2Mask))return startNextRound(1,{p1:0,p2:0});

    if(g.state==="fighting"&&!g.roundEnded){
      if(g.freeze>0){g.freeze--;}
      else{
        if(g.p1.hitStun>0){g.p1.hitStun--}
        else{
          if(hasBit(p1Mask,IB.L))g.p1.x-=CHARS.gandhi.sp;
          if(hasBit(p1Mask,IB.R))g.p1.x+=CHARS.gandhi.sp;
          if(hasBit(p1Mask,IB.U)&&!g.p1.isJumping){g.p1.vy=-15;g.p1.isJumping=true}
          g.p1.isBlocking=hasBit(p1Mask,IB.D);
          if(!g.p1.action||(g.p1.action==="super"&&g.p1.actionTimer<=0)){
            if(hasBit(p1Mask,IB.P)){g.p1.action="punch";g.p1.actionTimer=12;g.snd.push("punch");attack(g.p1,g.p2,"punch",g)}
            else if(hasBit(p1Mask,IB.K)){g.p1.action="kick";g.p1.actionTimer=18;g.snd.push("kick");attack(g.p1,g.p2,"kick",g)}
            else if(hasBit(p1Mask,IB.S)&&g.p1.special>=100){g.p1.action="special";g.p1.actionTimer=30;g.p1.special=0;attack(g.p1,g.p2,"special",g)}
          }
          if(hasBit(p1Mask,IB.SU)){
            if(g.p1.superReady&&!g.p1.superActive&&!g.p1.superUsed){
              g.p1.superReady=false;g.p1.superActive=true;g.p1.superBoomerangs=2;g.p1.superUsed=true;g.snd.push("boomerang");
              const d=g.p1.facing;g.projectiles.push({type:"boomerang",owner:"p1",x:g.p1.x+CW/2+d*20,y:g.p1.y+30,dir:d,phase:"out",rotation:0,age:0,hit:false});
              g.p1.superBoomerangs=1;g.p1.action="super";g.p1.actionTimer=15;
            }else if(g.p1.superActive&&g.p1.superBoomerangs>0){
              g.snd.push("boomerang");const d=g.p1.facing;
              g.projectiles.push({type:"boomerang",owner:"p1",x:g.p1.x+CW/2+d*20,y:g.p1.y+40,dir:d,phase:"out",rotation:1.5,age:0,hit:false});
              g.p1.superBoomerangs--;g.p1.action="super";g.p1.actionTimer=15;
              if(g.p1.superBoomerangs<=0)g.p1.superDeactivateFrame=fr+90;
            }
          }
        }

        if(g.p2.hitStun>0){g.p2.hitStun--}
        else{
          if(hasBit(p2Mask,IB.L))g.p2.x-=CHARS.binladen.sp;
          if(hasBit(p2Mask,IB.R))g.p2.x+=CHARS.binladen.sp;
          if(hasBit(p2Mask,IB.U)&&!g.p2.isJumping){g.p2.vy=-15;g.p2.isJumping=true}
          g.p2.isBlocking=hasBit(p2Mask,IB.D);
          if(!g.p2.action||(g.p2.action==="super"&&g.p2.actionTimer<=0)){
            if(!g.p2.superActive){
              if(hasBit(p2Mask,IB.P)){g.p2.action="punch";g.p2.actionTimer=12;g.snd.push("punch");attack(g.p2,g.p1,"punch",g)}
              else if(hasBit(p2Mask,IB.K)){g.p2.action="kick";g.p2.actionTimer=18;g.snd.push("kick");attack(g.p2,g.p1,"kick",g)}
              else if(hasBit(p2Mask,IB.S)&&g.p2.special>=100){g.p2.action="special";g.p2.actionTimer=30;g.p2.special=0;attack(g.p2,g.p1,"special",g)}
            }
          }
          if(hasBit(p2Mask,IB.SU)){
            if(g.p2.superReady&&!g.p2.superActive&&!g.p2.superUsed){
              g.p2.superReady=false;g.p2.superActive=true;g.p2.superBullets=5;g.p2.superUsed=true;g.snd.push("rocketLaunch");
              const d=g.p2.facing;g.projectiles.push({type:"rocket",owner:"p2",x:g.p2.x+CW/2+d*30,y:g.p2.y+33,dir:d,age:0,hit:false});
              g.p2.superBullets=4;g.p2.action="super";g.p2.actionTimer=10;
            }else if(g.p2.superActive&&g.p2.superBullets>0){
              g.snd.push("rocketLaunch");const d=g.p2.facing;
              g.projectiles.push({type:"rocket",owner:"p2",x:g.p2.x+CW/2+d*30,y:g.p2.y+33,dir:d,age:0,hit:false});
              g.p2.superBullets--;g.p2.action="super";g.p2.actionTimer=10;
              if(g.p2.superBullets<=0)g.p2.superDeactivateFrame=fr+18;
            }
          }
        }

        for(const p of[g.p1,g.p2]){
          p.vy+=1.0;p.y+=p.vy;
          if(p.y>=GY-CH){p.y=GY-CH;p.vy=0;p.isJumping=false}
          if(p.vx){p.x+=p.vx;p.vx*=0.75;if(Math.abs(p.vx)<0.5)p.vx=0}
          p.x=Math.max(10,Math.min(W-CW-10,p.x));
          if(p.actionTimer>0){p.actionTimer--;if(p.actionTimer<=0&&(p.action!=="super"||!p.superActive))p.action=null}
          if(p.comboTimer>0){p.comboTimer--;if(p.comboTimer<=0)p.combo=0}
        }
      }

      g.p1.facing=g.p1.x<g.p2.x?1:-1;g.p2.facing=g.p2.x<g.p1.x?1:-1;
      const ol=CW-Math.abs(g.p1.x-g.p2.x);
      if(ol>0&&Math.abs(g.p1.y-g.p2.y)<CH){const pu=ol/2;if(g.p1.x<g.p2.x){g.p1.x-=pu;g.p2.x+=pu}else{g.p1.x+=pu;g.p2.x-=pu}}
      g.p1.special=Math.min(100,g.p1.special+.05);g.p2.special=Math.min(100,g.p2.special+.05);
      updProj(g);

      g.timerAcc++;
      if(g.timerAcc>=60){g.timerAcc=0;if(g.timer>0)g.timer--}
      if(g.timer<=0&&!g.roundEnded)finishRound(g.p1.health>g.p2.health?"p1":g.p2.health>g.p1.health?"p2":"draw");
      if(!g.roundEnded){
        if(g.p1.health<=0)finishRound("p2");
        else if(g.p2.health<=0)finishRound("p1");
      }
      if(fr%120===0)g.snd.push("bgDrone");
    }

    g.fx=g.fx.map(e=>({...e,f:e.f+1})).filter(e=>e.f<20);
    if(g.shake>0)g.shake--;
    if(g.flash>0)g.flash--;
    return g;
  },[attack]);

  const rollbackFromFrame=useCallback((fromFrame)=>{
    const snapshot=getStateSnapshot(fromFrame);
    const localRole=roleR.current;
    if(!snapshot||!localRole)return;
    let state=copyGameStateInto(rollbackStateR.current,snapshot);
    rollbackStateR.current=state;
    let remoteMask=fromFrame>0?getUsedRemoteInput(fromFrame-1,0):0;
    for(let f=fromFrame;f<simFrameR.current;f++){
      const localMask=getLocalInput(f);
      if(hasRemoteInput(f))remoteMask=getRemoteInput(f,remoteMask);
      saveStateSnapshot(f,state);
      setUsedRemoteInput(f,remoteMask);
      const p1Mask=localRole==="p1"?localMask:remoteMask;
      const p2Mask=localRole==="p2"?localMask:remoteMask;
      state.snd=[];
      state=stepFrame(state,p1Mask,p2Mask,f);
      rollbackStateR.current=state;
      state.snd=[];
    }
    G.current=state;
    lastRemoteMaskR.current=remoteMask;
  },[getLocalInput,getRemoteInput,getStateSnapshot,getUsedRemoteInput,hasRemoteInput,saveStateSnapshot,setUsedRemoteInput,stepFrame]);

  const applyRemoteHistory=useCallback((latestFrame,history)=>{
    latestRemoteFrameR.current=Math.max(latestRemoteFrameR.current,latestFrame);
    if(startAtR.current==null)startAtR.current=performance.now()+SYNC_START_DELAY_MS;
    let rollbackFrame=null;
    const count=Math.min(Array.isArray(history)?history.length:0,latestFrame+1);
    for(let i=0;i<count;i++){
      const frame=latestFrame-count+1+i;
      if(frame<0)continue;
      const mask=(history[i]??0)&0xff;
      setRemoteInput(frame,mask);
      const usedMask=getUsedRemoteInput(frame,null);
      if(frame<simFrameR.current&&usedMask!=null&&usedMask!==mask&&rollbackFrame==null)rollbackFrame=frame;
    }
    advanceConfirmedRemoteFrame();
    if(rollbackFrame!=null)rollbackFromFrame(rollbackFrame);
  },[advanceConfirmedRemoteFrame,getUsedRemoteInput,rollbackFromFrame,setRemoteInput]);

  const onPacketBytes=useCallback((bytes)=>{
    if(!bytes?.length)return;
    const kind=bytes[0];
    if(kind===PK_READY){
      remoteReadyR.current=true;
      if(startAtR.current==null)startAtR.current=performance.now()+SYNC_START_DELAY_MS;
      return;
    }
    if(kind!==PK_INPUT||bytes.length<6)return;
    const view=new DataView(bytes.buffer,bytes.byteOffset,bytes.byteLength);
    const latestFrame=view.getUint32(2);
    const count=bytes[1];
    const history=[];
    for(let i=0;i<count;i++)history.push(bytes[6+i]|0);
    applyRemoteHistory(latestFrame,history);
  },[applyRemoteHistory]);

  const onData=useCallback((d)=>{
    const bytes=asPacketBytes(d);
    if(bytes){onPacketBytes(bytes);return;}
    if(d instanceof Blob){
      d.arrayBuffer().then(buf=>onPacketBytes(new Uint8Array(buf))).catch(()=>{});
      return;
    }
    if(d?.t==="ready"){
      remoteReadyR.current=true;
      if(startAtR.current==null)startAtR.current=performance.now()+SYNC_START_DELAY_MS;
    }else if(d?.t==="i2"&&typeof d.f==="number"){
      applyRemoteHistory(d.f|0,d.h);
    }
  },[applyRemoteHistory,onPacketBytes]);

  const setupConn=useCallback((conn)=>{
    connR.current=conn;
    conn.on("open",()=>{
      sfx.init();sfx.connect();
      resetSession();
      startAtR.current=performance.now()+SYNC_START_DELAY_MS;
      if(conn.dataChannel)conn.dataChannel.binaryType="arraybuffer";
      try{conn.send(makeReadyPacket())}catch(e){}
      lastReadySendR.current=performance.now();
      setScreen("fight");setStatus("");
    });
    conn.on("data",onData);
    conn.on("close",()=>{setScreen("dc");setStatus("Opponent disconnected")});
    conn.on("error",e=>{console.error("Conn error:",e);setStatus("Error: "+e.type)});
  },[onData,resetSession]);

      const youTxt=role==="p1"?"← YOU: GANDHI":"YOU: BIN LADEN →";

      if(g.ann){

    const pump=(ts,forcedMs=null)=>{
      if(!clockR.current.last)clockR.current.last=ts;
      const started=startAtR.current!=null&&ts>=startAtR.current;
      if(connR.current?.open&&!remoteReadyR.current&&ts-lastReadySendR.current>=READY_RESEND_MS){
        try{connR.current.send(makeReadyPacket())}catch(e){}
        lastReadySendR.current=ts;
      }
      const dt=started?(forcedMs!=null?forcedMs:Math.min(100,ts-clockR.current.last)):0;
      clockR.current.last=ts;
      clockR.current.acc+=dt;

      while(clockR.current.acc>=FRAME_MS){
        const sampleFrame=sampleFrameR.current;
        const inputFrame=sampleFrame+LOCAL_INPUT_DELAY;
        const localMask=encodeLocalInput();
        setLocalInput(inputFrame,localMask);
        localReadyFrameR.current=inputFrame;
        if(connR.current?.open){

        }
        sampleFrameR.current++;
        clockR.current.acc-=FRAME_MS;

      let steps=0;
      const maxPredictedFrame=Math.min(localReadyFrameR.current,confirmedRemoteFrameR.current+MAX_PREDICTION_FRAMES);
      while(simFrameR.current<=maxPredictedFrame&&steps<MAX_SIM_STEPS){

      }

    };

      const steps=Math.max(1,Math.round(ms/FRAME_MS));
      for(let i=0;i<steps;i++){

        pump(now,FRAME_MS);
      }
    };
    aid=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(aid);delete window.advanceTime};
  },[encodeLocalInput,getLocalInput,getRemoteInput,role,saveStateSnapshot,screen,setLocalInput,setUsedRemoteInput,stepFrame]);

  const vib=(ms)=>{try{navigator.vibrate?.(ms)}catch(e){}};

            <button onClick={()=>{if(isFS)exitFS();else goFS()}} style={{position:"fixed",top:8,right:8,zIndex:30,padding:"6px 14px",borderRadius:16,border:"1.5px solid rgba(255,255,255,0.3)",background:"rgba(0,0,0,0.7)",color:"#fff",fontSize:10,fontFamily:PF,display:"flex",alignItems:"center",gap:6,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}><span style={{fontSize:14}}>{isFS?"✕":"⛶"}</span>{isFS?"EXIT":"FULL"}</button>
          :null}
          <div style={{position:"fixed",bottom:6,left:6,zIndex:20}}>
            <div style={{position:"relative",width:175,height:175}}>
              <div style={{position:"absolute",top:12,left:12,width:150,height:150,borderRadius:"50%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)"}}/>
              <div style={{position:"absolute",top:0,left:54}}><Btn label="△" k={mk.u} color={mc} sz={62}/></div>
              <div style={{position:"absolute",top:56,left:0}}><Btn label="◁" k={mk.l} color={mc} sz={62}/></div>
              <div style={{position:"absolute",top:60,left:60}}><Btn label="○" k={mk.d} color={mc} sz={54}/></div>
              <div style={{position:"absolute",top:56,right:0}}><Btn label="▷" k={mk.r} color={mc} sz={62}/></div>
            </div>
          </div>
          <div style={{position:"fixed",bottom:6,right:6,zIndex:20}}>
            <div style={{position:"relative",width:175,height:175}}>
              <div style={{position:"absolute",top:12,left:12,width:150,height:150,borderRadius:"50%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.05)"}}/>
              <div style={{position:"absolute",top:0,left:54}}><Btn label="K" k={mk.k} color={mc} sz={62}/></div>
              <div style={{position:"absolute",top:56,left:0}}><Btn label="P" k={mk.p} color={mc} sz={62}/></div>
              <div style={{position:"absolute",top:56,right:0}}><Btn label="S" k={mk.s} color={mc} sz={62}/></div>
              <div style={{position:"absolute",bottom:0,left:54}}><TapBtn label="★" k={mk.su} color={mc} sz={62}/></div>
            </div>
          </div>
        </>
      :
        <div style={{border:`3px solid ${mc}`,borderRadius:6,padding:2,background:"#111",maxWidth:"100%",overflow:"hidden"}}>
          <canvas ref={cvR} width={W} height={H} style={{display:"block",maxWidth:"100%",height:"auto",imageRendering:"pixelated"}}/>
        </div>
      }
    </>}

    {screen==="dc"&&<div style={{textAlign:"center",padding:16}}>
      <div style={{color:"#ff4444",fontSize:13,marginBottom:12}}>DISCONNECTED</div>
      <div style={{color:"#888",fontSize:8,marginBottom:16}}>{status}</div>
      <button onClick={()=>{peerR.current?.destroy();setScreen("splash");setStatus("")}} style={{...bs,padding:"10px 24px",fontSize:10,color:"#000",background:"#e8a926"}}>BACK TO LOBBY</button>
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<ActiveGame/>);
</script>
</body>
</html>
