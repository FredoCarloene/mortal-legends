<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const STAGE_W=800,STAGE_H=400,GROUND_Y=320,GRAVITY=0.8,CHAR_W=60,CHAR_H=90,ROUND_TIME=99;
const CHARACTERS={gandhi:{name:"GANDHI",accent:"#e8a926",punchDmg:2,kickDmg:4,specialDmg:12,speed:3.8,blockReduction:0.85},binladen:{name:"BIN LADEN",accent:"#c0392b",punchDmg:2,kickDmg:4,specialDmg:12,speed:3.8,blockReduction:0.85}};
const PF="'Press Start 2P',monospace";
class ArcadeSFX {
  constructor() { this.ctx = null; this.masterGain = null; this.muted = false; this.volume = 0.35; }
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.masterGain = this.ctx.createGain(); this.masterGain.gain.value = this.volume; this.masterGain.connect(this.ctx.destination); } catch(e) {}
  }
  setMuted(m) { this.muted = m; if (this.masterGain) this.masterGain.gain.value = m ? 0 : this.volume; }
  _osc(type, freq, dur, g = 0.3) {
    if (!this.ctx || this.muted) return; const o = this.ctx.createOscillator(); const gn = this.ctx.createGain();
    o.type = type; o.frequency.value = freq; gn.gain.setValueAtTime(g, this.ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur); o.connect(gn); gn.connect(this.masterGain); o.start(); o.stop(this.ctx.currentTime + dur);
  }
  _noise(dur, g = 0.15) {
    if (!this.ctx || this.muted) return; const bs = this.ctx.sampleRate * dur; const buf = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
    const d = buf.getChannelData(0); for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf; const gn = this.ctx.createGain();
    gn.gain.setValueAtTime(g, this.ctx.currentTime); gn.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    const f = this.ctx.createBiquadFilter(); f.type = "highpass"; f.frequency.value = 800;
    src.connect(f); f.connect(gn); gn.connect(this.masterGain); src.start(); src.stop(this.ctx.currentTime + dur);
  }
  punch() { this._noise(0.08, 0.25); this._osc("square", 200, 0.06, 0.2); }
  kick() { this._osc("sine", 100, 0.15, 0.35); this._noise(0.1, 0.2); }
  special() { for (let i = 0; i < 5; i++) setTimeout(() => { this._osc("sawtooth", 300 + i * 120, 0.2, 0.2); }, i * 40); this._noise(0.3, 0.15); setTimeout(() => this._osc("sine", 800, 0.4, 0.25), 150); }
  block() { this._osc("triangle", 300, 0.1, 0.15); }
  hit() { this._noise(0.06, 0.3); this._osc("square", 150, 0.08, 0.2); }
  ko() { [600,500,400,300,200].forEach((f,i) => setTimeout(() => this._osc("square", f, 0.3, 0.2), i*100)); setTimeout(() => this._osc("sawtooth", 80, 0.8, 0.3), 500); }
  roundStart() { [523,659,784,1047].forEach((f,i) => setTimeout(() => this._osc("square", f, 0.15, 0.15), i*100)); }
  fight() { setTimeout(() => { this._osc("sawtooth", 400, 0.1, 0.2); setTimeout(() => this._osc("square", 1000, 0.3, 0.2), 80); }, 50); }
  menuSelect() { this._osc("square", 660, 0.08, 0.12); setTimeout(() => this._osc("square", 880, 0.08, 0.12), 60); }
  menuMove() { this._osc("square", 440, 0.04, 0.08); }
  menuBack() { this._osc("square", 440, 0.06, 0.1); setTimeout(() => this._osc("square", 330, 0.08, 0.1), 60); }
  win() { [523,659,784,880,1047,1175,1319,1568].forEach((f,i) => setTimeout(() => this._osc("square", f, 0.2, 0.12), i*120)); }
  superReady() { [800,1000,1200,1600].forEach((f,i) => setTimeout(() => this._osc("sawtooth", f, 0.12, 0.18), i*60)); this._osc("sine", 200, 0.5, 0.1); }
  boomerang() { for (let i = 0; i < 8; i++) setTimeout(() => this._osc("triangle", 500 + i * 60, 0.1, 0.15), i * 30); this._noise(0.2, 0.1); }
  gunshot() { this._noise(0.12, 0.4); this._osc("square", 60, 0.15, 0.3); this._osc("sawtooth", 150, 0.08, 0.2); }
  bgDrone() { if (!this.ctx || this.muted) return; this._osc("sine", 55, 2, 0.04); }
}
ArcadeSFX.prototype.connect=function(){this._osc("sine",880,.15,.2);setTimeout(()=>this._osc("sine",1320,.15,.2),100)};
ArcadeSFX.prototype.disconnect=function(){this._osc("sine",440,.2,.2);setTimeout(()=>this._osc("sine",220,.3,.2),100)};
const sfx=new ArcadeSFX();
function updateProjectiles(g){
  g.projectiles=g.projectiles.filter(p=>{
    p.age++;const tgt=p.owner==="p1"?g.p2:g.p1;const tx=tgt.x+CHAR_W/2;const ty=tgt.y+CHAR_H/2;
    if(p.type==="boomerang"){
      if(p.phase==="out"){const dx=tx-p.x;p.x+=dx>0?Math.min(8,dx):Math.max(-8,dx);p.y+=(ty-p.y)*.05;p.rotation+=.5;if(Math.abs(dx)<15||p.age>80)p.phase="back"}
      else{const ow=p.owner==="p1"?g.p1:g.p2;const ox=ow.x+CHAR_W/2;const dx=ox-p.x;p.x+=dx>0?Math.min(9,dx):Math.max(-9,dx);p.y+=((ow.y+35)-p.y)*.08;p.rotation+=.5;if(Math.abs(dx)<20)return false}
      if(Math.abs(p.x-tx)<35&&Math.abs(p.y-ty)<50&&!p.hit){p.hit=true;const dm=tgt.isBlocking?2:10;tgt.health=Math.max(0,tgt.health-dm);tgt.hitStun=12;g.shakeFrames=6;g.hitEffects.push({x:tx,y:tgt.y+30,frame:0,type:"special"});g.sfx.push(tgt.isBlocking?"block":"hit");(p.owner==="p1"?g.p1:g.p2).dmgDealt+=dm}
      return p.age<150;
    }else if(p.type==="bullet"){
      p.x+=p.dir*14;
      if(Math.abs(p.x-tx)<30&&Math.abs(p.y-ty)<45&&!p.hit){p.hit=true;const dm=tgt.isBlocking?1:4;tgt.health=Math.max(0,tgt.health-dm);tgt.hitStun=6;g.shakeFrames=4;g.hitEffects.push({x:tx,y:tgt.y+30,frame:0,type:"normal"});g.sfx.push(tgt.isBlocking?"block":"hit");(p.owner==="p1"?g.p1:g.p2).dmgDealt+=dm;return false}
      return p.x>-20&&p.x<STAGE_W+20;
    }
    return false;
  });
}
function drawProjectiles(ctx, projectiles, frame) {
  for (const p of projectiles) {
    if (p.type === "boomerang") {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
      ctx.shadowColor = "#e8a926"; ctx.shadowBlur = 12;
      ctx.fillStyle = "#e8a926"; ctx.fillRect(-20, -3, 40, 6);
      ctx.fillStyle = "#fff"; ctx.fillRect(-18, -1, 8, 2); ctx.fillRect(10, -1, 8, 2);
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(232,169,38,${0.3 + Math.sin(frame * 0.3) * 0.15})`;
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    } else if (p.type === "bullet") {
      ctx.save(); ctx.translate(p.x, p.y);
      ctx.fillStyle = "#ffdd44"; ctx.shadowColor = "#ff8800"; ctx.shadowBlur = 6;
      ctx.fillRect(p.dir > 0 ? -2 : -10, -2, 12, 4);
      ctx.fillStyle = `rgba(255,150,50,${Math.max(0, 0.5 - p.age * 0.03)})`;
      ctx.fillRect(p.dir > 0 ? -14 : 2, -1, 10, 2);
      ctx.shadowBlur = 0; ctx.restore();
    }
  }
}

// ─── CHARACTER DRAWING ───
function drawCharacter(ctx, player, facing, frame, action, isBlocking, superReady, superActive, superBullets, superBoomerangs, superUsed) {
  const { x, y } = player;
  const isGandhi = player.id === "gandhi";
  ctx.save(); ctx.translate(x + CHAR_W / 2, y);
  if (facing === -1) ctx.scale(-1, 1);
  ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(0, CHAR_H + 2, 30, 8, 0, 0, Math.PI * 2); ctx.fill();
  const bobY = Math.sin(frame * 0.15) * 2;

  if (superReady && !superActive) {
    const pulse = Math.sin(frame * 0.15) * 0.3 + 0.5;
    ctx.fillStyle = isGandhi ? `rgba(232,169,38,${pulse * 0.25})` : `rgba(192,57,43,${pulse * 0.25})`;
    ctx.beginPath(); ctx.arc(0, 45, 45 + Math.sin(frame * 0.2) * 5, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 4; i++) {
      const a = frame * 0.05 + i * Math.PI / 2;
      const r = 35 + Math.sin(frame * 0.1 + i) * 10;
      ctx.fillStyle = isGandhi ? "#e8a926" : "#ff4444";
      ctx.fillRect(Math.cos(a) * r - 1, 45 + Math.sin(a) * r - 1, 3, 3);
    }
  }
  if (superActive) {
    const pulse = Math.sin(frame * 0.25) * 0.2 + 0.4;
    ctx.fillStyle = isGandhi ? `rgba(232,169,38,${pulse})` : `rgba(192,57,43,${pulse})`;
    ctx.beginPath(); ctx.arc(0, 45, 35, 0, Math.PI * 2); ctx.fill();
  }

  if (isGandhi) drawGandhi(ctx, bobY, action, isBlocking, frame, superActive, superReady, superBoomerangs);
  else drawBinLaden(ctx, bobY, action, isBlocking, frame, superActive, superBullets, superReady);
  ctx.restore();
}

function drawGandhi(ctx, bobY, action, isBlocking, frame, superActive, superReady, superBoomerangs) {
  ctx.fillStyle = "#f5f0e0"; ctx.fillRect(-15, 25 + bobY, 30, 45);
  ctx.fillStyle = "#e8dcc0"; ctx.fillRect(-18, 40 + bobY, 6, 30);

  // FIX: kick = 1 standing leg + 1 kicking leg (not 3 legs)
  if (action === "kick") {
    ctx.fillStyle = "#8B7355"; ctx.fillRect(-12, 70 + bobY, 8, 18);
    ctx.fillStyle = "#654321"; ctx.fillRect(-14, 86 + bobY, 12, 4);
    ctx.fillStyle = "#8B7355"; ctx.fillRect(12, 65 + bobY, 28, 8);
    ctx.fillStyle = "#654321"; ctx.fillRect(36, 64 + bobY, 8, 4);
  } else {
    ctx.fillStyle = "#8B7355"; ctx.fillRect(-12, 70 + bobY, 8, 18); ctx.fillRect(4, 70 + bobY, 8, 18);
    ctx.fillStyle = "#654321"; ctx.fillRect(-14, 86 + bobY, 12, 4); ctx.fillRect(2, 86 + bobY, 12, 4);
  }

  ctx.fillStyle = "#C4956A"; ctx.beginPath(); ctx.arc(0, 18 + bobY, 16, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#333"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(-6, 16 + bobY, 5, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(6, 16 + bobY, 5, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-1, 16 + bobY); ctx.lineTo(1, 16 + bobY); ctx.stroke();
  ctx.fillStyle = "#222"; ctx.fillRect(-7, 15 + bobY, 3, 3); ctx.fillRect(5, 15 + bobY, 3, 3);
  ctx.strokeStyle = "#8B6914"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 20 + bobY, 5, 0.1, Math.PI - 0.1); ctx.stroke();
  ctx.fillStyle = "#C4956A";
  ctx.beginPath(); ctx.ellipse(-15, 18 + bobY, 4, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15, 18 + bobY, 4, 6, 0, 0, Math.PI * 2); ctx.fill();

  // Boomerang icons above head when super ready or active
  if (superReady || superActive) {
    const iconsToShow = superActive ? (superBoomerangs || 0) : 2;
    for (let i = 0; i < iconsToShow; i++) {
      const ix = -8 + i * 16;
      const iy = -8 + bobY + Math.sin(frame * 0.2 + i) * 2;
      ctx.save();
      ctx.translate(ix, iy);
      ctx.rotate(frame * 0.1);
      ctx.fillStyle = "#e8a926";
      ctx.shadowColor = "#e8a926"; ctx.shadowBlur = 4;
      ctx.fillRect(-6, -1.5, 12, 3);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  if (action === "super") {
    ctx.fillStyle = "#C4956A"; ctx.fillRect(15, 25 + bobY, 25, 8); ctx.fillRect(-20, 35 + bobY, 12, 8);
    ctx.fillStyle = "rgba(232,169,38,0.4)"; ctx.beginPath(); ctx.arc(0, 40 + bobY, 30, 0, Math.PI * 2); ctx.fill();
  } else if (action === "punch") {
    ctx.fillStyle = "#C4956A"; ctx.fillRect(15, 30 + bobY, 30, 8);
    ctx.fillStyle = "#8B6914"; ctx.fillRect(40, 25 + bobY, 4, 25);
  } else if (action === "kick") {
    ctx.fillStyle = "#C4956A"; ctx.fillRect(15, 30 + bobY, 15, 8); ctx.fillRect(-15, 30 + bobY, 15, 8);
  } else if (action === "special") {
    const angle = frame * 0.5;
    ctx.save(); ctx.translate(0, 40 + bobY); ctx.rotate(angle);
    ctx.fillStyle = "#e8a926"; ctx.shadowColor = "#e8a926"; ctx.shadowBlur = 15; ctx.fillRect(-30, -2, 60, 4); ctx.restore();
    ctx.fillStyle = "#C4956A"; ctx.fillRect(15, 30 + bobY, 12, 8); ctx.fillRect(-27, 30 + bobY, 12, 8);
    ctx.fillStyle = "rgba(232,169,38,0.3)"; ctx.beginPath(); ctx.arc(0, 45 + bobY, 35, 0, Math.PI * 2); ctx.fill();
  } else if (isBlocking) {
    ctx.fillStyle = "#C4956A"; ctx.fillRect(-5, 28 + bobY, 25, 8); ctx.fillRect(-20, 32 + bobY, 25, 8);
    ctx.strokeStyle = "rgba(232,169,38,0.6)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 45 + bobY, 25, 0, Math.PI * 2); ctx.stroke();
  } else {
    ctx.fillStyle = "#C4956A"; ctx.fillRect(15, 30 + bobY, 12, 8); ctx.fillRect(-27, 30 + bobY, 12, 8);
    if (!superActive) { ctx.fillStyle = "#8B6914"; ctx.fillRect(22, 25 + bobY, 3, 50); }
  }
}

function drawBinLaden(ctx, bobY, action, isBlocking, frame, superActive, superBullets, superReady) {
  ctx.fillStyle = "#4a4a4a"; ctx.fillRect(-18, 22 + bobY, 36, 50);
  ctx.fillStyle = "#3a3a3a"; ctx.fillRect(-18, 22 + bobY, 36, 5); ctx.fillRect(-2, 22 + bobY, 4, 50);

  // FIX: kick = 1 standing leg + 1 kicking leg
  if (action === "kick") {
    ctx.fillStyle = "#333"; ctx.fillRect(-12, 70 + bobY, 8, 18);
    ctx.fillStyle = "#222"; ctx.fillRect(-14, 84 + bobY, 12, 6);
    ctx.fillStyle = "#333"; ctx.fillRect(12, 65 + bobY, 30, 10);
    ctx.fillStyle = "#222"; ctx.fillRect(38, 63 + bobY, 10, 12);
  } else {
    ctx.fillStyle = "#333"; ctx.fillRect(-12, 70 + bobY, 8, 18); ctx.fillRect(4, 70 + bobY, 8, 18);
    ctx.fillStyle = "#222"; ctx.fillRect(-14, 84 + bobY, 12, 6); ctx.fillRect(2, 84 + bobY, 12, 6);
  }

  ctx.fillStyle = "#f0f0f0"; ctx.beginPath(); ctx.arc(0, 12 + bobY, 17, -Math.PI, 0); ctx.fill(); ctx.fillRect(-17, 5 + bobY, 34, 10);
  ctx.fillStyle = "#C4956A"; ctx.beginPath(); ctx.arc(0, 18 + bobY, 14, 0, Math.PI); ctx.fill(); ctx.fillRect(-14, 12 + bobY, 28, 10);
  ctx.fillStyle = "#444"; ctx.beginPath(); ctx.moveTo(-10, 22 + bobY); ctx.lineTo(10, 22 + bobY); ctx.lineTo(6, 35 + bobY); ctx.lineTo(0, 38 + bobY); ctx.lineTo(-6, 35 + bobY); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.fillRect(-8, 14 + bobY, 6, 4); ctx.fillRect(2, 14 + bobY, 6, 4);
  ctx.fillStyle = "#111"; ctx.fillRect(-6, 15 + bobY, 3, 3); ctx.fillRect(3, 15 + bobY, 3, 3);
  ctx.fillStyle = "#333";
  ctx.save(); ctx.translate(-5, 12 + bobY); ctx.rotate(-0.2); ctx.fillRect(-4, 0, 8, 2); ctx.restore();
  ctx.save(); ctx.translate(5, 12 + bobY); ctx.rotate(0.2); ctx.fillRect(-4, 0, 8, 2); ctx.restore();
  ctx.fillStyle = "#2a2a1a"; ctx.fillRect(-22, 28 + bobY, 8, 20);
  ctx.fillStyle = "#3a3a2a"; ctx.fillRect(-21, 30 + bobY, 6, 16);

  // Bullet icons above head: 5 circles (gold=live, dark=spent) — no mirrored text
  if (superReady || superActive) {
    const totalBullets = 5;
    const liveBullets = superActive ? (superBullets || 0) : totalBullets;
    for (let i = 0; i < totalBullets; i++) {
      const ix = -16 + i * 8;
      const iy = -8 + bobY + Math.sin(frame * 0.15 + i * 0.5) * 1.5;
      ctx.save();
      if (i < liveBullets) {
        ctx.fillStyle = "#e8a926";
        ctx.shadowColor = "#e8a926"; ctx.shadowBlur = 3;
      } else {
        ctx.fillStyle = "#333";
        ctx.shadowBlur = 0;
      }
      ctx.beginPath(); ctx.arc(ix, iy, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(ix - 1, iy + 2, 2, 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  if (superActive) {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(10, 32 + bobY, 15, 8);
    ctx.fillStyle = "#555"; ctx.fillRect(20, 30 + bobY, 35, 6);
    ctx.fillStyle = "#3a2a1a"; ctx.fillRect(15, 30 + bobY, 12, 10);
    ctx.fillStyle = "#444"; ctx.fillRect(28, 36 + bobY, 4, 10);
    ctx.fillStyle = "#666"; ctx.fillRect(50, 29 + bobY, 8, 3);
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(-5, 34 + bobY, 20, 6);
    if (action === "super" && frame % 4 < 2) {
      ctx.fillStyle = "#ffaa00"; ctx.beginPath(); ctx.arc(60, 31 + bobY, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(60, 31 + bobY, 3, 0, Math.PI * 2); ctx.fill();
    }
  } else if (action === "punch") {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(15, 30 + bobY, 30, 10); ctx.fillStyle = "#C4956A"; ctx.fillRect(42, 28 + bobY, 10, 12);
  } else if (action === "kick") {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(15, 30 + bobY, 15, 8); ctx.fillRect(-15, 30 + bobY, 15, 8);
  } else if (action === "special") {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(15, 25 + bobY, 20, 8); ctx.fillRect(-35, 25 + bobY, 20, 8);
    const ps = 20 + Math.sin(frame * 0.4) * 8;
    ctx.fillStyle = "rgba(192,57,43,0.5)"; ctx.beginPath(); ctx.arc(0, 45 + bobY, ps, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,50,50,0.8)"; ctx.beginPath(); ctx.arc(0, 45 + bobY, ps * 0.5, 0, Math.PI * 2); ctx.fill();
  } else if (isBlocking) {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(-5, 25 + bobY, 25, 10); ctx.fillRect(-20, 30 + bobY, 25, 10);
    ctx.strokeStyle = "rgba(192,57,43,0.5)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 45 + bobY, 25, 0, Math.PI * 2); ctx.stroke();
  } else {
    ctx.fillStyle = "#4a4a4a"; ctx.fillRect(15, 30 + bobY, 15, 8); ctx.fillRect(-30, 30 + bobY, 15, 8);
    ctx.fillStyle = "#C4956A"; ctx.fillRect(28, 28 + bobY, 8, 10); ctx.fillRect(-30, 28 + bobY, 8, 10);
  }
}

function drawStage(ctx, w, h, frame) {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, "#0a0a2e"); skyGrad.addColorStop(0.5, "#1a0a3e"); skyGrad.addColorStop(1, "#2d1b69");
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, w, GROUND_Y);
  ctx.fillStyle = "#1a1040"; ctx.beginPath(); ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= w; x += 40) ctx.lineTo(x, GROUND_Y - 60 - Math.sin(x * 0.02) * 30 - Math.cos(x * 0.01) * 20);
  ctx.lineTo(w, GROUND_Y); ctx.fill();
  ctx.fillStyle = "#ffe4b5"; ctx.shadowColor = "#ffe4b5"; ctx.shadowBlur = 30;
  ctx.beginPath(); ctx.arc(650, 60, 25, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  for (let i = 0; i < 30; i++) { const sx = (i * 137.5) % w, sy = (i * 73.1) % (GROUND_Y - 80); const tw = Math.sin(frame * 0.1 + i) * 0.5 + 0.5; ctx.fillStyle = `rgba(255,255,255,${0.3 + tw * 0.7})`; ctx.fillRect(sx, sy, 2, 2); }
  for (const tx of [80, 720]) {
    ctx.fillStyle = "#5a3a1a"; ctx.fillRect(tx - 3, GROUND_Y - 80, 6, 80);
    const fl = Math.sin(frame * 0.3 + tx) * 3;
    ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.ellipse(tx, GROUND_Y - 85, 8 + fl, 15 + fl, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#ffaa00"; ctx.beginPath(); ctx.ellipse(tx, GROUND_Y - 88, 4 + fl * 0.5, 8 + fl * 0.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "rgba(255,100,0,0.1)"; ctx.beginPath(); ctx.arc(tx, GROUND_Y - 80, 40, 0, Math.PI * 2); ctx.fill();
  }
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, h);
  gg.addColorStop(0, "#4a3520"); gg.addColorStop(0.3, "#3a2810"); gg.addColorStop(1, "#1a1005");
  ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, w, h - GROUND_Y);
  ctx.strokeStyle = "#6a4530"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(w, GROUND_Y); ctx.stroke();

// HUD — moved down so player names visible with dark backdrop
function drawHealthBar(ctx, x, y, health, maxHealth, special, name, accent, isRight, superReady, superActive, superLabel, superCount) {
  const barW = 280, barH = 20, ratio = Math.max(0, health / maxHealth), specR = Math.min(1, special / 100);

  // Dark backdrop behind name for visibility
  const nameX = isRight ? x + barW : x;
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(isRight ? x + barW - 120 : x, y - 20, 120, 16);
  ctx.fillStyle = "#fff"; ctx.font = `bold 11px ${pixelFont}`; ctx.textAlign = isRight ? "right" : "left";
  ctx.fillText(name, nameX, y - 8);

  ctx.fillStyle = "#222"; ctx.fillRect(x, y, barW, barH);
  const hg = ctx.createLinearGradient(x, y, x + barW, y);
  if (ratio > 0.5) { hg.addColorStop(0, "#00cc44"); hg.addColorStop(1, "#00ff55"); }
  else if (ratio > 0.25) { hg.addColorStop(0, "#ccaa00"); hg.addColorStop(1, "#ffcc00"); }
  else { hg.addColorStop(0, "#cc2200"); hg.addColorStop(1, "#ff3300"); }
  ctx.fillStyle = hg;
  if (isRight) ctx.fillRect(x + barW * (1 - ratio), y, barW * ratio, barH); else ctx.fillRect(x, y, barW * ratio, barH);
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.strokeRect(x, y, barW, barH);
  ctx.fillStyle = "#fff"; ctx.font = `10px ${pixelFont}`; ctx.textAlign = "center"; ctx.fillText(`${Math.ceil(health)}`, x + barW / 2, y + 14);
  const sY = y + barH + 4;
  ctx.fillStyle = "#111"; ctx.fillRect(x, sY, barW, 7);
  ctx.fillStyle = accent; if (isRight) ctx.fillRect(x + barW * (1 - specR), sY, barW * specR, 7); else ctx.fillRect(x, sY, barW * specR, 7);
  ctx.strokeStyle = "#555"; ctx.lineWidth = 1; ctx.strokeRect(x, sY, barW, 7);
  if (specR >= 1) { ctx.fillStyle = accent; ctx.font = `7px ${pixelFont}`; ctx.textAlign = isRight ? "right" : "left"; ctx.fillText("SPECIAL READY!", isRight ? x + barW : x, sY + 17); }
  const suY = sY + 20;
  ctx.font = `bold 7px ${pixelFont}`; ctx.textAlign = isRight ? "right" : "left";
  if (superActive) {
    ctx.fillStyle = "#ff4444";
    ctx.fillText(`${superLabel} ACTIVE! [${superCount}]`, isRight ? x + barW : x, suY);
  } else if (superReady) {
    ctx.fillStyle = accent;
    ctx.fillText(`★ ${superLabel} READY`, isRight ? x + barW : x, suY);
  }
}

function drawHitEffect(ctx, x, y, frame, type) {
  if (frame > 15) return;
  const alpha = 1 - frame / 15, size = 10 + frame * 3;
  if (type === "special") {
    ctx.fillStyle = `rgba(255,200,50,${alpha})`; ctx.beginPath(); ctx.arc(x, y, size * 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,100,0,${alpha * 0.8})`; ctx.beginPath(); ctx.arc(x, y, size * 1.2, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; ctx.fillStyle = `rgba(255,255,100,${alpha})`; ctx.fillRect(x + Math.cos(a) * size * 1.5, y + Math.sin(a) * size * 1.5, 4, 4); }
  } else {
    ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();

  }
}

function drawComboText(ctx, x, y, combo, frame) {

}

      // RENDER (both host and client)
      const gs=gsR.current,ann=annR.current,rd=rdR.current,wn=wnR.current,tm=tmR.current;
      ctx.save();if(g.shakeFrames>0)ctx.translate((Math.random()-.5)*g.shakeFrames*3,(Math.random()-.5)*g.shakeFrames*3);
      ctx.clearRect(-10,-10,STAGE_W+20,STAGE_H+20);drawStage(ctx,STAGE_W,STAGE_H,fr);
      drawCharacter(ctx,g.p1,g.p1.facing,fr,g.p1.action,g.p1.isBlocking,g.p1.superReady,g.p1.superActive,0,g.p1.superBoomerangs);
      drawCharacter(ctx,g.p2,g.p2.facing,fr,g.p2.action,g.p2.isBlocking,g.p2.superReady,g.p2.superActive,g.p2.superBullets,0);
      drawProjectiles(ctx,g.projectiles,fr);
      for(const ef of g.hitEffects)drawHitEffect(ctx,ef.x,ef.y,ef.frame,ef.type);
      drawComboText(ctx,g.p1.x+CHAR_W/2,g.p1.y,g.p2.combo,fr);drawComboText(ctx,g.p2.x+CHAR_W/2,g.p2.y,g.p1.combo,fr);
      drawHealthBar(ctx,20,18,g.p1.health,g.p1.maxHealth,g.p1.special,CHARACTERS.gandhi.name,CHARACTERS.gandhi.accent,false,g.p1.superReady,g.p1.superActive,"BOOMERANG",g.p1.superBoomerangs);
      drawHealthBar(ctx,500,18,g.p2.health,g.p2.maxHealth,g.p2.special,CHARACTERS.binladen.name,CHARACTERS.binladen.accent,true,g.p2.superReady,g.p2.superActive,"AK-47",g.p2.superBullets);
      ctx.fillStyle="#111";ctx.fillRect(STAGE_W/2-30,14,60,35);ctx.strokeStyle="#e8a926";ctx.lineWidth=2;ctx.strokeRect(STAGE_W/2-30,14,60,35);
      ctx.fillStyle=tm<=10?"#ff3333":"#fff";ctx.font=`bold 18px ${PF}`;ctx.textAlign="center";ctx.fillText(String(tm),STAGE_W/2,40);
      ctx.fillStyle="#888";ctx.font=`8px ${PF}`;ctx.fillText(`ROUND ${rd}`,STAGE_W/2,62);
      for(let i=0;i<2;i++){ctx.fillStyle=i<wn.p1?"#e8a926":"#333";ctx.beginPath();ctx.arc(330+i*15,59,4,0,Math.PI*2);ctx.fill()}
      for(let i=0;i<2;i++){ctx.fillStyle=i<wn.p2?"#c0392b":"#333";ctx.beginPath();ctx.arc(455+i*15,59,4,0,Math.PI*2);ctx.fill()}
      ctx.fillStyle=myR==="p1"?"#e8a926":"#c0392b";ctx.font=`bold 8px ${PF}`;ctx.textAlign="center";ctx.fillText(myR==="p1"?"← YOU":"YOU →",myR==="p1"?160:640,STAGE_H-8);
      if(ann){ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,STAGE_H/2-50,STAGE_W,100);ctx.shadowColor="#ff4444";ctx.shadowBlur=15;ctx.fillStyle="#fff";ctx.font=`bold 32px ${PF}`;ctx.textAlign="center";ctx.fillText(ann,STAGE_W/2,STAGE_H/2+10);ctx.shadowBlur=0;if(gs==="gameover"&&Math.sin(fr*.08)>0){ctx.fillStyle="#e8a926";ctx.font=`10px ${PF}`;ctx.fillText(isH?"TAP REMATCH":"WAITING FOR HOST...",STAGE_W/2,STAGE_H/2+50)}}
      ctx.restore();aid=requestAnimationFrame(loop);
    };
    if(screen==="fighting")aid=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(aid);
  },[screen,playerRole,hAtk,hRE,ser]);

  // Mobile touch handlers
  const hmt=(k,p)=>{mcR.current={...mcR.current,[k]:p}};
  const hmtap=k=>{mtR.current={...mtR.current,[k]:true}};
  const MB=({l,mk,color="#fff",sz=48})=>(<button onTouchStart={e=>{e.preventDefault();hmt(mk,true)}} onTouchEnd={e=>{e.preventDefault();hmt(mk,false)}} onMouseDown={()=>hmt(mk,true)} onMouseUp={()=>hmt(mk,false)} onMouseLeave={()=>hmt(mk,false)} style={{width:sz,height:sz,borderRadius:10,border:`2px solid ${color}`,background:"rgba(0,0,0,0.7)",color,fontFamily:PF,fontSize:9,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"none"}}>{l}</button>);
  const TB=({l,mk,color="#fff",sz=48})=>(<button onTouchStart={e=>{e.preventDefault();hmtap(mk)}} onMouseDown={()=>hmtap(mk)} style={{width:sz,height:sz,borderRadius:10,border:`2px solid ${color}`,background:`${color}22`,color,fontFamily:PF,fontSize:9,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"none"}}>{l}</button>);

  const cpL=()=>{navigator.clipboard?.writeText(`${window.location.origin}${window.location.pathname}?room=${roomCode}`).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)})};
  const rematch=()=>{if(roleR.current!=="host")return;gR.current=initG();gsR.current="countdown";annR.current="ROUND 1";rdR.current=1;wnR.current={p1:0,p2:0};tmR.current=ROUND_TIME;rdE.current=false;sfx.roundStart();setTimeout(()=>{annR.current="FIGHT!";sfx.fight();gsR.current="fighting";gR.current.sfx.push("fight");setTimeout(()=>{annR.current=""},1000)},2000)};

  const myK=playerRole==="p1"?{l:"a",r:"d",u:"w",d:"s",p:"f",k:"g",s:"h",su:"t"}:{l:"left",r:"right",u:"up",d:"down",p:"punch",k:"kick",s:"special",su:"super"};
  const myC=playerRole==="p1"?"#e8a926":"#c0392b";const myN=playerRole==="p1"?"GANDHI":"BIN LADEN";
  const bs={fontFamily:PF,cursor:"pointer",userSelect:"none",border:"none",borderRadius:8,fontWeight:"bold"};

  return(<div style={{background:"#000",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:PF,padding:10,overflow:"hidden"}}>
    {screen==="lobby"&&<div style={{maxWidth:420,width:"100%",textAlign:"center",padding:20}}><div style={{color:"#ff2222",fontSize:22,marginBottom:4,textShadow:"0 0 20px #ff4444"}}>MORTAL</div><div style={{color:"#ff2222",fontSize:22,marginBottom:16,textShadow:"0 0 20px #ff4444"}}>LEGENDS</div><div style={{color:"#e8a926",fontSize:9,marginBottom:30}}>ONLINE MULTIPLAYER</div><button onClick={createRoom} style={{...bs,width:"100%",padding:"14px 0",fontSize:12,color:"#000",background:"#e8a926",marginBottom:16}}>CREATE ROOM (P1)</button><div style={{color:"#888",fontSize:8,marginBottom:12}}>— OR JOIN —</div><div style={{display:"flex",gap:8,marginBottom:12}}><input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase().slice(0,4))} onKeyDown={e=>{if(e.key==="Enter"&&joinCode.length===4)joinRoom(joinCode)}} placeholder="CODE" maxLength={4} style={{flex:1,padding:12,fontSize:16,fontFamily:PF,background:"#111",border:"2px solid #444",borderRadius:8,color:"#fff",textAlign:"center",letterSpacing:6}}/><button onClick={()=>joinRoom(joinCode)} disabled={joinCode.length!==4} style={{...bs,padding:"12px 20px",fontSize:10,color:joinCode.length===4?"#fff":"#000",background:joinCode.length===4?"#c0392b":"#555"}}>JOIN</button></div>{statusMsg&&<div style={{color:"#ff4444",fontSize:8,marginTop:12}}>{statusMsg}</div>}<div style={{color:"#444",fontSize:6,marginTop:30,lineHeight:1.8}}>P1 = GANDHI · P2 = BIN LADEN<br/>EACH PLAYER USES OWN PHONE<br/>WebRTC P2P · NO SERVER</div></div>}

    {screen==="waiting"&&<div style={{maxWidth:420,width:"100%",textAlign:"center",padding:20}}><div style={{color:"#e8a926",fontSize:14,marginBottom:20}}>WAITING FOR OPPONENT</div>{roomCode&&<><div style={{color:"#888",fontSize:8,marginBottom:8}}>ROOM CODE:</div><div style={{color:"#fff",fontSize:36,letterSpacing:12,marginBottom:16,textShadow:"0 0 20px #e8a926"}}>{roomCode}</div><div style={{color:"#888",fontSize:7,marginBottom:12}}>Share code or link with opponent</div><button onClick={cpL} style={{...bs,padding:"10px 24px",fontSize:8,color:"#e8a926",background:"transparent",border:"2px solid #e8a926",borderRadius:8,marginBottom:16}}>{copied?"COPIED!":"COPY INVITE LINK"}</button></>}<div style={{color:"#888",fontSize:8,marginTop:12}}>{statusMsg}</div><div style={{margin:"20px auto",width:24,height:24,border:"3px solid #e8a926",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style><button onClick={()=>{connR.current?.close();peerR.current?.destroy();setScreen("lobby");setStatusMsg("")}} style={{...bs,marginTop:20,padding:"8px 20px",fontSize:8,color:"#666",background:"transparent",border:"1px solid #333"}}>CANCEL</button></div>}

    {screen==="fighting"&&<><div style={{border:`3px solid ${myC}`,borderRadius:8,padding:3,background:"#111",boxShadow:`0 0 20px ${myC}44`,maxWidth:"100%",overflow:"hidden"}}><canvas ref={cvRef} width={STAGE_W} height={STAGE_H} style={{display:"block",maxWidth:"100%",height:"auto",imageRendering:"pixelated"}}/></div>{gsR.current==="gameover"&&roleR.current==="host"&&<button onClick={rematch} style={{...bs,marginTop:10,padding:"10px 30px",fontSize:10,color:"#000",background:"#e8a926"}}>REMATCH</button>}{isMobile&&<div style={{width:"100%",maxWidth:STAGE_W,marginTop:10,padding:"0 8px",boxSizing:"border-box"}}><div style={{color:myC,fontSize:8,textAlign:"center",marginBottom:6}}>YOU: {myN}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><MB l="▲" mk={myK.u} color={myC}/><div style={{display:"flex",gap:3}}><MB l="◄" mk={myK.l} color={myC}/><MB l="BLK" mk={myK.d} color="#888"/><MB l="►" mk={myK.r} color={myC}/></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}><MB l="PNC" mk={myK.p} color="#ff6644" sz={54}/><MB l="KCK" mk={myK.k} color="#44aaff" sz={54}/><MB l="SPL" mk={myK.s} color={myC} sz={54}/><TB l="★" mk={myK.su} color="#ff8844" sz={54}/></div></div></div>}</>}

    {screen==="disconnected"&&<div style={{textAlign:"center",padding:20}}><div style={{color:"#ff4444",fontSize:14,marginBottom:16}}>DISCONNECTED</div><div style={{color:"#888",fontSize:8,marginBottom:20}}>{statusMsg}</div><button onClick={()=>{peerR.current?.destroy();setScreen("lobby");setStatusMsg("");setRoomCode("");setJoinCode("")}} style={{...bs,padding:"12px 30px",fontSize:10,color:"#000",background:"#e8a926"}}>BACK TO LOBBY</button></div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<FightingGame/>);
</script>
</body>
</html>
